<style>
  :root {
    --bg: #f1f5f9;
    --surface: #ffffff;
    --surface-soft: #f8fafc;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    --radius-xl: 24px;
    --radius-lg: 18px;
    --radius-md: 14px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }

  .stack {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    padding: 20px;
  }

  .card-soft {
    background: var(--surface-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
  }

  .header-row,
  .row-between {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }

  .title {
    margin: 0;
    font-size: 30px;
    line-height: 1.15;
  }

  .subtitle {
    margin: 0 0 8px 0;
    color: var(--muted);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: bold;
  }

  .helper {
    color: var(--muted);
    font-size: 14px;
    margin: 6px 0 0 0;
  }

  .grid-stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .stat {
    background: var(--surface-soft);
    border-radius: var(--radius-md);
    padding: 12px;
  }

  .stat-label {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .stat-value {
    font-size: 18px;
    font-weight: bold;
    margin-top: 6px;
  }

  .section-title {
    margin: 0 0 12px 0;
    font-size: 20px;
  }

  .match-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .match-item {
    background: var(--surface-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: bold;
    background: #0f172a;
    color: #fff;
  }

  .status-pill {
    display: inline-flex;
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: bold;
  }

  .status-live {
    background: #dcfce7;
    color: #166534;
  }

  .status-pending {
    background: #fef3c7;
    color: #92400e;
  }

  .status-done {
    background: #dbeafe;
    color: #1d4ed8;
  }

  .status-closed {
    background: #e2e8f0;
    color: #334155;
  }

  .muted {
    color: var(--muted);
  }

  .loading,
  .empty,
  .error {
    padding: 20px;
    border-radius: var(--radius-lg);
    background: var(--surface-soft);
    border: 1px solid var(--border);
  }

  .error {
    color: #991b1b;
    background: #fef2f2;
    border-color: #fecaca;
  }

  @media (max-width: 900px) {
    .grid-stats {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .header-row {
      flex-direction: column;
      align-items: flex-start;
    }
  }

  @media (max-width: 640px) {
    .page {
      padding: 16px;
    }

    .grid-stats {
      grid-template-columns: 1fr 1fr;
    }

    .title {
      font-size: 24px;
    }
  }
</style>
