<style>
  :root {
    --bg: #f1f5f9;
    --surface: #ffffff;
    --surface-soft: #f8fafc;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    --radius-xl: 24px;
    --radius-lg: 18px;
    --radius-md: 14px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }

  .stack {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    padding: 20px;
  }

  .card-soft {
    background: var(--surface-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
  }

  .header-row,
  .row-between {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }

  .title {
    margin: 0;
    font-size: 30px;
    line-height: 1.15;
  }

  .subtitle {
    margin: 0 0 8px 0;
    color: var(--muted);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: bold;
  }

  .helper {
    color: var(--muted);
    font-size: 14px;
    margin: 6px 0 0 0;
  }

  .grid-stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .stat {
    background: var(--surface-soft);
    border-radius: var(--radius-md);
    padding: 12px;
  }

  .stat-label {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .stat-value {
    font-size: 18px;
    font-weight: bold;
    margin-top: 6px;
  }

  .section-title {
    margin: 0 0 12px 0;
    font-size: 20px;
  }

  .match-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .match-item {
    background: var(--surface-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: bold;
    background: #0f172a;
    color: #fff;
  }

  .status-pill {
    display: inline-flex;
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: bold;
  }

  .status-live {
    background: #dcfce7;
    color: #166534;
  }

  .status-pending {
    background: #fef3c7;
    color: #92400e;
  }

  .status-done {
    background: #dbeafe;
    color: #1d4ed8;
  }

  .status-closed {
    background: #e2e8f0;
    color: #334155;
  }

  .muted {
    color: var(--muted);
  }

  .loading,
  .empty,
  .error {
    padding: 20px;
    border-radius: var(--radius-lg);
    background: var(--surface-soft);
    border: 1px solid var(--border);
  }

  .error {
    color: #991b1b;
    background: #fef2f2;
    border-color: #fecaca;
  }

  .admin-grid {
    display: grid;
    grid-template-columns: minmax(240px, 1.2fr) minmax(0, 1.8fr);
    gap: 16px;
    align-items: start;
  }

  .admin-field,
  .admin-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .admin-actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .admin-text-input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
    background: #ffffff;
    color: #0f172a;
  }

  .admin-action-button {
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid #cbd5e1;
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
    color: #ffffff;
    font-weight: bold;
    cursor: pointer;
    transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    box-shadow: 0 6px 16px rgba(15, 23, 42, 0.10);
  }

  .admin-action-button:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 18px rgba(15, 23, 42, 0.12);
  }

  .admin-action-button[disabled] {
    opacity: 0.6;
    cursor: wait;
    transform: none;
    box-shadow: none;
  }

  .admin-action-button-secondary {
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    color: #0f172a;
  }

  .admin-action-button-danger {
    border-color: #ef4444;
    background: linear-gradient(180deg, #dc2626 0%, #991b1b 100%);
  }

  .admin-summary-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .admin-kv {
    display: grid;
    grid-template-columns: minmax(120px, 160px) minmax(0, 1fr);
    gap: 8px 12px;
    align-items: start;
  }

  .admin-kv-label {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .admin-code {
    font-family: Consolas, "Courier New", monospace;
    font-size: 13px;
    word-break: break-word;
  }

  #capture-modal-overlay .capture-action {
    width: 100%;
    padding: 12px 14px;
    border-radius: 16px;
    border: 1px solid #d6dee8;
    background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
    color: #ffffff;
    font-weight: bold;
    cursor: pointer;
    transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease, border-color 120ms ease;
    box-shadow: 0 6px 16px rgba(15, 23, 42, 0.10);
  }

  #capture-modal-overlay .capture-action:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 18px rgba(15, 23, 42, 0.12);
    border-color: #c3d0df;
    background: linear-gradient(180deg, #334155 0%, #1e293b 100%);
  }

  #capture-modal-overlay .capture-action:active,
  #capture-modal-overlay .capture-action.is-pressed {
    transform: translateY(0);
    box-shadow: inset 0 2px 6px rgba(15, 23, 42, 0.22);
    border-color: #b8c6d6;
    background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
  }

  #capture-modal-overlay .capture-action-secondary {
    border-color: #d9e2ec;
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    color: #0f172a;
  }

  #capture-modal-overlay .capture-action-secondary:hover {
    border-color: #c4d0dc;
    background: linear-gradient(180deg, #f8fafc 0%, #eef3f8 100%);
  }

  #capture-modal-overlay .capture-action-secondary:active,
  #capture-modal-overlay .capture-action-secondary.is-pressed {
    border-color: #b7c4d2;
    background: linear-gradient(180deg, #e8eef5 0%, #dfe7f0 100%);
  }

  #capture-modal-overlay .capture-action[disabled],
  #capture-modal-overlay .capture-close[disabled] {
    cursor: wait;
    opacity: 0.65;
    transform: none;
    box-shadow: none;
  }

  #capture-modal-overlay .capture-close {
    padding: 8px 12px;
    border-radius: 14px;
    border: 1px solid #d6dee8;
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease;
  }

  #capture-modal-overlay .capture-close:hover {
    background: linear-gradient(180deg, #f8fafc 0%, #eef3f8 100%);
    border-color: #b8c6d6;
  }

  @media (max-width: 900px) {
    .grid-stats {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .header-row {
      flex-direction: column;
      align-items: flex-start;
    }

    .admin-grid,
    .admin-summary-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 640px) {
    .admin-actions {
      grid-template-columns: 1fr;
    }

    .page {
      padding: 16px;
    }

    .grid-stats {
      grid-template-columns: 1fr 1fr;
    }

    .title {
      font-size: 24px;
    }
  }
</style>
