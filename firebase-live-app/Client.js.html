<script>
  const PUBLIC_REALTIME_BOOT_TIMEOUT_MS = 3000;
  const MYDAY_REALTIME_BOOT_TIMEOUT_MS = 1200;
  const MYDAY_REFRESH_MS = 5000;
  const CLIENT_CLOCK_TICK_MS = 1000;
  const LOCAL_STORAGE_PLAYER_KEY = 'ttm_selected_player_id';
  const LOCAL_STORAGE_GROUPS_PLAYER_KEY = 'ttm_groups_selected_player_id';
  const LOCAL_STORAGE_SCREEN_KEY = 'ttm_active_screen';
  const LOCAL_STORAGE_TIME_FAST_PATH_KEY = 'ttm_time_fast_path_v1';
  const LOCAL_STORAGE_CONTROL_HEARTBEAT_ENABLED_KEY = 'ttm_control_heartbeat_enabled';
  const LOCAL_STORAGE_CONTROL_HEARTBEAT_INTERVAL_KEY = 'ttm_control_heartbeat_interval_seconds';
  const LOCAL_STORAGE_CONTROL_HEARTBEAT_CLIENT_ID_KEY = 'ttm_control_heartbeat_client_id';
  const CONTROL_HEARTBEAT_DEFAULT_SECONDS = 5;
  const CONTROL_HEARTBEAT_MIN_SECONDS = 3;
  const CONTROL_HEARTBEAT_MAX_SECONDS = 30;
  const CONTROL_HEARTBEAT_LEASE_MS = 15000;
  const CONTROL_HEARTBEAT_LEASE_PATH = 'control/heartbeatLease';
  const FIREBASE_CONFIG = {
    apiKey: 'AIzaSyB1Nrl8x_wJqBzy1uzqLGOdM243h8Dw6Fw',
    authDomain: 'appttour.firebaseapp.com',
    projectId: 'appttour',
    storageBucket: 'appttour.firebasestorage.app',
    messagingSenderId: '298018962537',
    appId: '1:298018962537:web:88606ac251f2d7b904f6f8',
    measurementId: 'G-E1L3YDJEMS',
  };

  let publicLoadInFlight = false;
  let publicLastSuccessAt = null;
  let publicRealtimeSnapshotReceived = false;
  let publicRealtimeBootstrapTimer = null;
  let currentPublicVm = null;
  let publicHighestSnapshotVersionSeen = '';
  let currentMyDayVm = null;
  let currentSinglesGroupsVm = null;
  let currentDoublesVm = null;
  let currentAdminVm = null;
  let adminActionInFlight = false;
  let myDayRefreshTimer = null;
  let myDayLoadInFlight = false;
  let myDayHeartbeatInFlight = false;
  let myDayLastSuccessAt = null;
  let myDayLastErrorMessage = '';
  let myDayClockTimer = null;
  let myDayClockSnapshot = null;
  let myDayRealtimeSnapshotReceived = false;
  let myDayRealtimeBootstrapTimer = null;
  let doublesLoadRequestSeq = 0;
  let doublesLoadRequestActive = 0;
  let doublesIsLoading = false;
  let doublesLoadingTitle = '';
  let doublesLoadingDetail = '';
  let db = null;
  let realtimeMatchesRef = null;
  let realtimeMyDayRef = null;
  let realtimeDoublesRef = null;
  let realtimeListenerAttached = false;
  let realtimeMyDayPlayerId = '';
  let realtimeDoublesPlayerId = '';
  let lastRealtimePayload = null;
  let lastRealtimeMatches = [];
  let appHeaderClockSnapshot = null;
  let controlHeartbeatEnabled = false;
  let controlHeartbeatTimer = null;
  let controlHeartbeatInFlight = false;
  let controlHeartbeatClientId = '';
  let controlHeartbeatLeadership = false;
  let controlHeartbeatLeaseRef = null;
  let controlHeartbeatLeaseInfo = null;
  let controlHeartbeatWakeLock = null;

  document.addEventListener('DOMContentLoaded', function () {
    initializeControlHeartbeatState();
    initializeAppScreens();
    restoreHeaderTimeFastPath_();
    initializeFirebaseRealtime();
    startPublicScreenBootstrap_();
    startClientClockTicker();
    loadPlayerSelector();
    loadSinglesGroupsConfig();
    loadDoublesConfig();
    loadAdminControl();
    bindControlHeartbeatLifecycle();
  });

  function initializeAppScreens() {
    const savedScreen = getSavedAppScreen();
    setActiveAppScreen(savedScreen || 'public');
  }

  function initializeControlHeartbeatState() {
    controlHeartbeatEnabled = getStoredControlHeartbeatEnabled_();
    controlHeartbeatClientId = getOrCreateControlHeartbeatClientId_();
  }

  function bindControlHeartbeatLifecycle() {
    const intervalInput = document.getElementById('control-heartbeat-interval-input');
    if (intervalInput) {
      intervalInput.addEventListener('change', function () {
        getControlHeartbeatIntervalSeconds_();
        if (controlHeartbeatEnabled) {
          startControlHeartbeatLoopIfNeeded_();
          runControlHeartbeatCycle_();
        } else {
          updateControlHeartbeatUi();
        }
      });
    }

    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible') {
        resyncPublicScreenOnFocus_();
        if (controlHeartbeatEnabled) {
          updateControlHeartbeatUi();
          startControlHeartbeatLoopIfNeeded_();
          requestControlHeartbeatWakeLock_();
          runControlHeartbeatCycle_();
        }
        return;
      }

      releaseControlHeartbeatWakeLock_();
    });

    window.addEventListener('focus', function () {
      resyncPublicScreenOnFocus_();
    });

    window.addEventListener('beforeunload', function () {
      releaseControlHeartbeatLease_();
      releaseControlHeartbeatWakeLock_();
    });
  }

  function getSavedAppScreen() {
    try {
      return window.localStorage.getItem(LOCAL_STORAGE_SCREEN_KEY) || 'public';
    } catch (error) {
      return 'public';
    }
  }

  function saveAppScreen(screen) {
    try {
      window.localStorage.setItem(LOCAL_STORAGE_SCREEN_KEY, screen);
    } catch (error) {
      // ignore storage failures
    }
  }

  function setActiveAppScreen(screen) {
    const nextScreen = String(screen || 'public').trim() || 'public';
    const tabs = document.querySelectorAll('[data-screen-tab]');
    const panels = document.querySelectorAll('[data-screen-panel]');
    const activeTabScreen = resolveParentScreenForTabs(nextScreen);

    tabs.forEach(function (tab) {
      const isActive = tab.getAttribute('data-screen-tab') === activeTabScreen;
      tab.classList.toggle('is-active', isActive);
      tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });

    panels.forEach(function (panel) {
      const isActive = panel.getAttribute('data-screen-panel') === nextScreen;
      panel.classList.toggle('is-active', isActive);
      panel.hidden = !isActive;
    });

    saveAppScreen(nextScreen);
    if (nextScreen === 'groups') {
      loadSinglesGroupsConfig({ silent: true });
    }
    if (nextScreen === 'myday') {
      const savedPlayerId = getSavedPlayerId();
      if (savedPlayerId) {
        subscribeRealtimeViewModels(savedPlayerId);
        startMyDayRealtimeBootstrap_(savedPlayerId, true);
      }
      refreshCurrentPlayerExperience({ silent: true });
    }
    if (nextScreen === 'doubles') {
      refreshCurrentPlayerExperience({ silent: true });
    }
    handleControlHeartbeatScreenChange_();
    window.scrollTo({ top: 0, behavior: 'auto' });
  }

  function resolveParentScreenForTabs(screen) {
    const value = String(screen || '').trim();
    if (value === 'doubles') return 'myday';
    if (value === 'groups') return 'admin';
    return value || 'public';
  }

  function handleControlHeartbeatScreenChange_() {
    if (isAdminScreenActive_()) {
      updateControlHeartbeatUi();
      startControlHeartbeatLoopIfNeeded_();
      return;
    }

    stopControlHeartbeatLoop_();
    releaseControlHeartbeatWakeLock_();
  }

  function isAdminScreenActive_() {
    const adminPanel = document.querySelector('[data-screen-panel="admin"]');
    return !!(adminPanel && adminPanel.classList.contains('is-active') && !adminPanel.hidden);
  }

  function shouldLoadDoublesConfigForCurrentSelection() {
    const playerId = getSavedPlayerId();
    if (!playerId) return false;
    if (doublesIsLoading) return false;

    const actorId = currentDoublesVm && currentDoublesVm.actor
      ? String(currentDoublesVm.actor.id || '').trim()
      : '';

    return actorId !== playerId;
  }

  function restoreHeaderTimeFastPath_() {
    const stored = getStoredHeaderTimeFastPath_();
    if (!stored) return;

    const hydrated = buildHeaderTimeFastPathSnapshot_(stored);
    if (!hydrated) return;

    updateAppHeaderClockSnapshot(hydrated, { forceResetProjection: true });
  }

  function getStoredHeaderTimeFastPath_() {
    try {
      const raw = window.localStorage.getItem(LOCAL_STORAGE_TIME_FAST_PATH_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      return parsed && typeof parsed === 'object' ? parsed : null;
    } catch (error) {
      return null;
    }
  }

  function persistHeaderTimeFastPath_(snapshot) {
    if (!snapshot || !snapshot.usesTimeState) return;

    const payload = {
      savedAtMs: Date.now(),
      serverOffsetMs: Number(snapshot.serverOffsetMs || 0),
      tournamentStartMs: Number(snapshot.tournamentStartMs || 0),
      tournamentElapsedMs: Number(snapshot.tournamentElapsedMs || 0),
      pausedAccumulatedMs: Number(snapshot.pausedAccumulatedMs || 0),
      timerStatus: String(snapshot.timerStatus || (snapshot.isRunning ? 'running' : 'paused')).trim(),
      currentPhase: String(snapshot.currentPhase || '').trim(),
      phaseRemainingMs: Number(snapshot.phaseRemainingMs || 0),
      phaseSequence: Array.isArray(snapshot.phaseSequence) ? snapshot.phaseSequence.slice() : ['scheduled', 'live', 'closing', 'transition'],
      phases: snapshot.phases && typeof snapshot.phases === 'object' ? snapshot.phases : {},
    };

    try {
      window.localStorage.setItem(LOCAL_STORAGE_TIME_FAST_PATH_KEY, JSON.stringify(payload));
    } catch (error) {
      // ignore storage failures
    }
  }

  function buildHeaderTimeFastPathSnapshot_(stored) {
    const tournamentStartMs = Number(stored && stored.tournamentStartMs || 0);
    if (!tournamentStartMs) return null;

    const savedAtMs = Number(stored && stored.savedAtMs || 0);
    const nowMs = Date.now();
    const driftMs = Math.max(0, nowMs - savedAtMs);
    const baseSnapshot = {
      isRunning: String(stored && stored.timerStatus || '').trim() === 'running',
      tournamentElapsedMs: Math.max(0, Number(stored && stored.tournamentElapsedMs || 0)),
      pausedAccumulatedMs: Math.max(0, Number(stored && stored.pausedAccumulatedMs || 0)),
      currentPhase: String(stored && stored.currentPhase || '').trim() || 'scheduled',
      phaseRemainingMs: Math.max(0, Number(stored && stored.phaseRemainingMs || 0)),
      phaseSequence: Array.isArray(stored && stored.phaseSequence) ? stored.phaseSequence.slice() : ['scheduled', 'live', 'closing', 'transition'],
      phases: stored && stored.phases && typeof stored.phases === 'object' ? stored.phases : {},
    };
    const projected = projectTimeStatePhase_(baseSnapshot, baseSnapshot.isRunning ? driftMs : 0);
    const effectiveServerNowMs = nowMs + Number(stored && stored.serverOffsetMs || 0);

    return {
      serverNowMs: effectiveServerNowMs,
      tournamentStartMs: tournamentStartMs,
      tournamentStartTs: formatClockStamp(tournamentStartMs),
      tournamentElapsedMs: projected.elapsedMs,
      pausedAccumulatedMs: Number(stored && stored.pausedAccumulatedMs || 0),
      currentPhase: projected.currentPhase,
      phaseRemainingMs: projected.phaseRemainingMs,
      phaseSequence: baseSnapshot.phaseSequence,
      phases: baseSnapshot.phases,
      timerStatus: baseSnapshot.isRunning ? 'running' : 'paused',
    };
  }

  function startPublicAutoRefresh() {
    setRefreshIndicator('Sincronizacion en tiempo real activada');
  }

  function startPublicScreenBootstrap_() {
    clearPublicRealtimeBootstrapTimer_();

    if (!realtimeListenerAttached) {
      loadPublicScreen();
      return;
    }

    setRefreshIndicator('Conectando pantalla publica con Firebase...');
    publicRealtimeBootstrapTimer = window.setTimeout(function () {
      if (publicRealtimeSnapshotReceived) return;
      loadPublicScreen();
    }, PUBLIC_REALTIME_BOOT_TIMEOUT_MS);
  }

  function clearPublicRealtimeBootstrapTimer_() {
    if (!publicRealtimeBootstrapTimer) return;
    window.clearTimeout(publicRealtimeBootstrapTimer);
    publicRealtimeBootstrapTimer = null;
  }

  function resyncPublicScreenOnFocus_() {
    if (!isPublicScreenActive_()) return;

    if (currentPublicVm) {
      renderPublicScreenAtClientTime_();
    }

    if (lastRealtimePayload) {
      applyRealtimeMatchesToViews(lastRealtimeMatches, { preserveGeneratedAt: true });
    }
  }

  function stopPublicAutoRefresh() {
    return;
  }

  function isPublicScreenActive_() {
    const publicPanel = document.querySelector('[data-screen-panel="public"]');
    return !!(publicPanel && publicPanel.classList.contains('is-active') && !publicPanel.hidden);
  }

  function isMyDayScreenActive_() {
    const myDayPanel = document.querySelector('[data-screen-panel="myday"]');
    return !!(myDayPanel && myDayPanel.classList.contains('is-active') && !myDayPanel.hidden);
  }

  function isDoublesScreenActive_() {
    const doublesPanel = document.querySelector('[data-screen-panel="doubles"]');
    return !!(doublesPanel && doublesPanel.classList.contains('is-active') && !doublesPanel.hidden);
  }

  function startMyDayAutoRefresh() {
    stopMyDayAutoRefresh();

    myDayRefreshTimer = window.setInterval(function () {
      refreshCurrentPlayerExperience({ silent: true });
    }, MYDAY_REFRESH_MS);
  }

  function stopMyDayAutoRefresh() {
    if (myDayRefreshTimer) {
      window.clearInterval(myDayRefreshTimer);
      myDayRefreshTimer = null;
    }
  }

  function startClientClockTicker() {
    stopClientClockTicker();

    myDayClockTimer = window.setInterval(function () {
      updateAppHeaderClock();
      updateAdminClockPanel_();
      updateMyDayClockHud();
    }, CLIENT_CLOCK_TICK_MS);
  }

  function stopClientClockTicker() {
    if (myDayClockTimer) {
      window.clearInterval(myDayClockTimer);
      myDayClockTimer = null;
    }
  }

  function loadPublicScreen(options) {
    const opts = options || {};
    const silent = !!opts.silent;

    if (publicLoadInFlight) return;

    publicLoadInFlight = true;
    setRefreshIndicator(silent ? 'Actualizando...' : 'Cargando datos...');

    google.script.run
      .withSuccessHandler(function (vm) {
        publicLoadInFlight = false;
        publicLastSuccessAt = new Date();
        const gasVm = vm || null;
        if (gasVm) {
          renderPublicScreen(gasVm);
          syncRealtimeStateFromAcceptedPublicVm_(gasVm);
        }

        const realtimeVm = buildRealtimePublicVmIfFresh_(gasVm);
        if (realtimeVm) {
          renderPublicScreen(realtimeVm);
          syncRealtimeStateFromAcceptedPublicVm_(realtimeVm);
        }
        setRefreshIndicator(buildRefreshIndicatorText());
      })
      .withFailureHandler(function (error) {
        publicLoadInFlight = false;
        renderPublicScreenError(error);
        setRefreshIndicator('Error al actualizar');
      })
      .getPublicViewModel();
  }

  function renderPublicScreen(vm) {
    if (!shouldAcceptIncomingSnapshotVm_(vm)) {
      if (currentPublicVm) {
        renderPublicScreenAtClientTime_();
      }
      return;
    }

    const previousBlockId = currentPublicVm && currentPublicVm.currentBlock
      ? String(currentPublicVm.currentBlock.id || '').trim()
      : '';
    const nextBlockId = vm && vm.currentBlock
      ? String(vm.currentBlock.id || '').trim()
      : '';
    const didBlockChange = previousBlockId !== nextBlockId;

    currentPublicVm = vm;
    rememberPublicSnapshotVersion_(vm);
    if (shouldAcceptIncomingClockBase_(vm, didBlockChange)) {
      updateAppHeaderClockSnapshot(selectPublicTimeReference_(vm), {
        forceResetProjection: didBlockChange,
      });
    }
    renderPublicScreenAtClientTime_();
  }

  function shouldAcceptIncomingClockBase_(vm, didBlockChange) {
    if (didBlockChange) return true;
    if (!vm || !vm.timeState) return false;

    const incomingTimerStatus = String(vm.timeState.timerStatus || '').trim();
    const currentTimerStatus = appHeaderClockSnapshot
      ? String(appHeaderClockSnapshot.timerStatus || (appHeaderClockSnapshot.isRunning ? 'running' : 'paused')).trim()
      : '';
    if (incomingTimerStatus && incomingTimerStatus !== currentTimerStatus) {
      return true;
    }

    const incomingServerNowMs = Number(vm.timeState.serverNowMs || 0);
    const currentServerNowMs = appHeaderClockSnapshot ? Number(appHeaderClockSnapshot.serverNowMs || 0) : 0;
    if (incomingServerNowMs && currentServerNowMs && incomingServerNowMs >= currentServerNowMs) {
      return true;
    }

    const incomingInternalNowMs = getIncomingTournamentNowMs_(vm);
    const projectedSnapshot = getProjectedClockSnapshot_();
    if (!incomingInternalNowMs || !projectedSnapshot || !projectedSnapshot.internalNowMs) {
      return true;
    }

    const currentBlockId = currentPublicVm && currentPublicVm.currentBlock
      ? String(currentPublicVm.currentBlock.id || '').trim()
      : '';
    const nextBlockId = vm && vm.currentBlock
      ? String(vm.currentBlock.id || '').trim()
      : '';

    if (!currentBlockId || currentBlockId !== nextBlockId) {
      return true;
    }

    return projectedSnapshot.internalNowMs - incomingInternalNowMs <= 1000;
  }

  function selectPublicTimeReference_(vm) {
    if (!vm) return null;
    return vm.timeState || null;
  }

  function getIncomingTournamentNowMs_(vm) {
    if (!vm) return 0;
    const startMs = Number(vm.timeState && vm.timeState.tournamentStartMs || 0) || parseCanonicalDateTime(vm.timeState && vm.timeState.tournamentStartTs);
    const elapsedMs = Number(vm.timeState && vm.timeState.tournamentElapsedMs || 0);
    if (startMs && Number.isFinite(elapsedMs)) {
      return startMs + Math.max(0, elapsedMs);
    }
    const fallbackNowMs = Number(vm.timeState && vm.timeState.tournamentNowMs || 0);
    if (fallbackNowMs) return fallbackNowMs;
    return parseCanonicalDateTime(vm.timeState && vm.timeState.tournamentNowTs);
  }

  function renderPublicScreenAtClientTime_() {
    const vm = buildPublicVmForClientTime_(currentPublicVm);
    renderTopStats(vm);
    renderPublicPhaseGadget(vm);
    renderPublicDebug(vm);
    renderPublicMatches(vm);
  }

  function shouldAcceptIncomingSnapshotVm_(vm) {
    const nextVersion = getSnapshotVersion_(vm && (vm.snapshotVersion || vm.generatedAt));
    if (!nextVersion) return true;
    if (!publicHighestSnapshotVersionSeen) return true;
    return compareSnapshotVersions_(nextVersion, publicHighestSnapshotVersionSeen) >= 0;
  }

  function rememberPublicSnapshotVersion_(vm) {
    const nextVersion = getSnapshotVersion_(vm && (vm.snapshotVersion || vm.generatedAt));
    if (!nextVersion) return;
    if (!publicHighestSnapshotVersionSeen || compareSnapshotVersions_(nextVersion, publicHighestSnapshotVersionSeen) >= 0) {
      publicHighestSnapshotVersionSeen = nextVersion;
    }
  }

  function renderPublicDebug(vm) {
    const root = document.getElementById('public-debug-indicator');
    if (!root) return;

    const snapshotVersion = getSnapshotVersion_(vm && (vm.snapshotVersion || vm.generatedAt)) || '-';
    const internalNowTs = vm && vm.timeState
      ? String(vm.timeState.tournamentNowTs || '').trim()
      : '';
    const blockStatus = vm && vm.currentBlock ? String(vm.currentBlock.visualStatusCode || '').trim() : '';
    const generatedAt = vm ? String(vm.generatedAt || '').trim() : '';

    root.textContent = `snapshot ${snapshotVersion} | interna ${internalNowTs || '-'} | bloque ${blockStatus || '-'} | payload ${generatedAt || '-'}`;
  }

  function renderPublicPhaseGadget(vm) {
    const root = document.getElementById('public-phase-gadget');
    if (!root) return;

    const projectedClock = getProjectedClockSnapshot_();
    const phase = String(
      projectedClock && projectedClock.currentPhase ||
      vm && vm.timeState && vm.timeState.currentPhase ||
      ''
    ).trim();
    const remainingMs = Math.max(0, Number(
      projectedClock && projectedClock.phaseRemainingMs ||
      vm && vm.timeState && vm.timeState.phaseRemainingMs ||
      0
    ));
    const tournamentStatus = String(vm && vm.tournamentStatus || '').trim();

    const state = buildPublicPhaseGadgetState_(phase, remainingMs, tournamentStatus, !!(projectedClock && projectedClock.isRunning));
    root.innerHTML = `
      <span class="${escapeHtml(state.ledClass)}"></span>
      <div class="public-phase-gadget__copy">
        <div class="public-phase-gadget__label">${escapeHtml(state.label)}</div>
        <div class="public-phase-gadget__countdown">${escapeHtml(state.countdown)}</div>
      </div>
    `;
  }

  function buildPublicPhaseGadgetState_(phase, remainingMs, tournamentStatus, isRunning) {
    if (tournamentStatus === 'awaiting_singles_group_confirmation') {
      return {
        ledClass: 'public-phase-gadget__led public-phase-gadget__led--idle',
        label: 'Checkpoint manual',
        countdown: 'Esperando confirmación de grupos',
      };
    }

    if (tournamentStatus === 'awaiting_doubles_final' || tournamentStatus === 'awaiting_singles_final') {
      return {
        ledClass: 'public-phase-gadget__led public-phase-gadget__led--idle',
        label: 'Checkpoint manual',
        countdown: 'Esperando programación de finales',
      };
    }

    if (tournamentStatus === 'finished') {
      return {
        ledClass: 'public-phase-gadget__led public-phase-gadget__led--idle',
        label: 'Estado del torneo',
        countdown: 'Torneo finalizado',
      };
    }

    if (phase === 'scheduled') {
      return {
        ledClass: `public-phase-gadget__led public-phase-gadget__led--scheduled${isRunning ? ' public-phase-gadget__led--blink' : ''}`,
        label: 'Calentamiento previo',
        countdown: formatCountdown(remainingMs),
      };
    }

    if (phase === 'live') {
      return {
        ledClass: `public-phase-gadget__led public-phase-gadget__led--live${isRunning ? ' public-phase-gadget__led--blink' : ''}`,
        label: 'Tiempo de juego disponible',
        countdown: formatCountdown(remainingMs),
      };
    }

    if (phase === 'closing') {
      return {
        ledClass: `public-phase-gadget__led public-phase-gadget__led--closing${isRunning ? ' public-phase-gadget__led--blink' : ''}`,
        label: 'Ventana de cierre',
        countdown: formatCountdown(remainingMs),
      };
    }

    if (phase === 'transition') {
      return {
        ledClass: 'public-phase-gadget__led public-phase-gadget__led--idle',
        label: 'Cierre administrativo',
        countdown: formatCountdown(remainingMs),
      };
    }

    if (phase === 'closed') {
      return {
        ledClass: 'public-phase-gadget__led public-phase-gadget__led--idle',
        label: 'Bloque cerrado',
        countdown: 'Esperando siguiente bloque',
      };
    }

    return {
      ledClass: 'public-phase-gadget__led public-phase-gadget__led--idle',
      label: 'Sincronización',
      countdown: '--:--:--',
    };
  }

  function initializeFirebaseRealtime() {
    if (typeof firebase === 'undefined' || !firebase || typeof firebase.initializeApp !== 'function') {
      console.warn('Firebase compat no esta disponible en el cliente.');
      setRefreshIndicator('Firebase no disponible para pantalla publica');
      startMyDayAutoRefresh();
      return;
    }

    try {
      if (!firebase.apps || !firebase.apps.length) {
        firebase.initializeApp(FIREBASE_CONFIG);
      }

      db = firebase.database();
      subscribeRealtimeMatches();
    } catch (error) {
      console.error('No fue posible inicializar Firebase Realtime Database.', error);
      setRefreshIndicator('Error de conexion realtime');
      startMyDayAutoRefresh();
    }
  }

  function subscribeRealtimeMatches() {
    if (!db || realtimeListenerAttached) return;

    realtimeMatchesRef = db.ref('partidos');
    realtimeMatchesRef.on('value', function (snapshot) {
      publicRealtimeSnapshotReceived = true;
      clearPublicRealtimeBootstrapTimer_();
      lastRealtimePayload = snapshot ? snapshot.val() : null;
      lastRealtimeMatches = normalizeRealtimeMatchesPayload(lastRealtimePayload);
      const realtimeMeta = extractRealtimePublicMeta(lastRealtimePayload);
      if (!shouldApplyRealtimePublicMeta_(realtimeMeta, currentPublicVm)) {
        setRefreshIndicator(buildRefreshIndicatorText());
        return;
      }
      applyRealtimeMatchesToViews(lastRealtimeMatches);
      setRefreshIndicator(lastRealtimeMatches.length ? 'Sincronizado en tiempo real' : 'Esperando asignación de mesas');
    }, function (error) {
      console.error('Error al escuchar partidos en Firebase.', error);
      clearPublicRealtimeBootstrapTimer_();
      setRefreshIndicator('Error de sincronizacion realtime');
    });

    realtimeListenerAttached = true;
  }

  function subscribeRealtimeViewModels(playerId) {
    const normalizedPlayerId = String(playerId || '').trim();

    if (!db || !normalizedPlayerId) {
      unsubscribeRealtimeViewModels();
      return;
    }

    subscribeRealtimeMyDay(normalizedPlayerId);
    subscribeRealtimeDoubles(normalizedPlayerId);
  }

  function unsubscribeRealtimeViewModels() {
    unsubscribeRealtimeMyDay();
    unsubscribeRealtimeDoubles();
  }

  function subscribeRealtimeMyDay(playerId) {
    const normalizedPlayerId = String(playerId || '').trim();
    if (!db || !normalizedPlayerId) return;
    if (realtimeMyDayRef && realtimeMyDayPlayerId === normalizedPlayerId) return;

    unsubscribeRealtimeMyDay();
    realtimeMyDayPlayerId = normalizedPlayerId;
    realtimeMyDayRef = db.ref(`players/${normalizedPlayerId}/myDay`);
    realtimeMyDayRef.on('value', function (snapshot) {
      const vm = snapshot ? snapshot.val() : null;
      if (!vm) return;
      myDayRealtimeSnapshotReceived = true;
      clearMyDayRealtimeBootstrapTimer_();
      myDayLastSuccessAt = new Date();
      myDayLastErrorMessage = '';
      renderMyDay(vm);
    }, function (error) {
      console.error('Error al escuchar myDay en Firebase.', error);

      tableNo: realtimeMatch && realtimeMatch.tableNo != null ? realtimeMatch.tableNo : baseMatch.tableNo,
      phaseLabel: realtimeMatch && realtimeMatch.phaseLabel ? realtimeMatch.phaseLabel : baseMatch.phaseLabel,
      leftLabel: realtimeMatch && realtimeMatch.leftLabel ? realtimeMatch.leftLabel : baseMatch.leftLabel,
      rightLabel: realtimeMatch && realtimeMatch.rightLabel ? realtimeMatch.rightLabel : baseMatch.rightLabel,
      matchupLabel: realtimeMatch && realtimeMatch.matchupLabel ? realtimeMatch.matchupLabel : baseMatch.matchupLabel,
      eventState: nextEventState,
      isByeAdvance: typeof realtimeMatch.isByeAdvance === 'boolean' ? realtimeMatch.isByeAdvance : baseMatch.isByeAdvance,
      allowedCaptureActions: Object.assign({}, baseMatch.allowedCaptureActions, deriveCaptureActionsFromRealtimeEventState(nextEventState)),
    };
  }

  function normalizeMyDayEventState_(eventState) {
    const source = eventState && typeof eventState === 'object' ? eventState : {};

    return {
      resultSubmitted: !!source.resultSubmitted,
      autoClosed: !!source.autoClosed,
      walkover: !!source.walkover,
      tableBlocked: !!source.tableBlocked,
      needsReview: !!source.needsReview,
      resultMode: String(source.resultMode || '').trim(),
      closingState: String(source.closingState || '').trim(),
    };
  }

  function deriveCaptureActionsFromRealtimeEventState(eventState) {
    const state = normalizeMyDayEventState_(eventState);
    const isClosed = state.resultSubmitted || state.autoClosed;

    return {
      canOpen: !isClosed,
      canSubmitFinal: !isClosed,
      canSubmitClosingState: !isClosed,
    };
  }

  function shouldRenderPublicEmptyState_(vm, matches) {
    const tournamentStatus = String(vm && vm.tournamentStatus || '').trim();
    if (tournamentStatus === 'awaiting_singles_group_confirmation') return true;
    if (tournamentStatus === 'awaiting_doubles_final') return true;
    if (tournamentStatus === 'awaiting_singles_final') return true;
    if (tournamentStatus === 'finished') return true;
    if (!vm || !vm.currentBlock) return true;
    if (!matches || !matches.length) return true;
    return !matches.some(isRenderablePublicMatch_);
  }

  function getPublicEmptyStateMessage_(vm) {
    const tournamentStatus = String(vm && vm.tournamentStatus || '').trim();

    if (tournamentStatus === 'awaiting_singles_group_confirmation') {
      return 'Esperando confirmación de grupos';
    }

    if (tournamentStatus === 'awaiting_doubles_final' || tournamentStatus === 'awaiting_singles_final') {
      return 'Esperando programación de finales';
    }

    if (tournamentStatus === 'finished') {
      return 'Torneo finalizado';
    }

    return 'Esperando asignación de mesas';
  }

  function isRenderablePublicMatch_(match) {
    if (!match || typeof match !== 'object') return false;

    const matchupLabel = String(match.matchupLabel || '').trim();
    const leftLabel = String(match.leftLabel || '').trim();
    const rightLabel = String(match.rightLabel || '').trim();
    const tableNo = String(match.tableNo || '').trim();

    return !!(matchupLabel || leftLabel || rightLabel || tableNo);
  }

  function enhancePublicMatchups(root, matches) {
    const items = root ? root.querySelectorAll('.match-item') : [];
    if (!items || !items.length) return;

    items.forEach(function (article, index) {
      const match = matches && matches[index];
      if (!match) return;

      const detailBlock = article.children[1];
      const legacyMatchup = detailBlock ? detailBlock.firstElementChild : null;
      if (!legacyMatchup) return;

      legacyMatchup.outerHTML = renderResponsiveMatchup(match);
    });
  }

  function renderResponsiveMatchup(match) {
    const leftLabel = String(match && match.leftLabel || '').trim();
    const rightLabel = String(match && match.rightLabel || '').trim();
    const matchupLabel = String(match && match.matchupLabel || '').trim();
    const fallbackLabel = matchupLabel || `${leftLabel || '-'} vs ${rightLabel || '-'}`;
    const isStructuredMatchup = !!leftLabel &&
      !!rightLabel &&
      leftLabel !== 'BYE' &&
      rightLabel !== 'BYE' &&
      matchupLabel.indexOf('Pasan a la siguiente ronda') === -1;

    if (!isStructuredMatchup) {
      return `
        <div class="matchup-display matchup-display--solo">
          ${escapeHtml(fallbackLabel)}
        </div>
      `;
    }

    return `
      <div class="matchup-display matchup-display--emphasis">
        <span class="matchup-display__side">${escapeHtml(leftLabel)}</span>
        <span class="matchup-display__anchor">vs</span>
        <span class="matchup-display__side">${escapeHtml(rightLabel)}</span>
      </div>
    `;
  }

  function renderStatusPill(status) {
    const value = String(status || '');
    let cls = 'status-closed';

    if (value === 'En juego') cls = 'status-live';
    else if (value === 'Programado') cls = 'status-pending';
    else if (value === 'Pendiente') cls = 'status-pending';
    else if (value === 'Resultado ingresado') cls = 'status-done';
    else if (value === 'Mesa bloqueada') cls = 'status-pending';
    else if (value === 'WO') cls = 'status-done';
    else if (value === 'Cierre en curso') cls = 'status-live';

    return `<span class="status-pill ${cls}">${escapeHtml(value || '-')}</span>`;
  }

  function buildPublicVmForClientTime_(vm) {
    const baseVm = vm || {};
    const projectedClock = getProjectedClockSnapshot_();
    const currentBlock = baseVm.currentBlock ? Object.assign({}, baseVm.currentBlock) : null;
    const matches = Array.isArray(baseVm.matches) ? baseVm.matches.map(function (match) {
      return Object.assign({}, match);
    }) : [];

    if (!projectedClock || !currentBlock) {
      return Object.assign({}, baseVm, {
        currentBlock: currentBlock,
        matches: matches,
      });
    }

    const expectedBlockStatus = String(projectedClock.currentPhase || '').trim() || getExpectedBlockStatus(currentBlock, projectedClock.internalNowMs);
    currentBlock.visualStatusCode = expectedBlockStatus;
    currentBlock.visualStatusLabel = formatTournamentStateLabel({ status: expectedBlockStatus });

    matches.forEach(function (match) {
      match.visualStatus = derivePublicMatchStatus_(match, currentBlock, projectedClock.internalNowMs);
    });

    return Object.assign({}, baseVm, {
      currentBlock: currentBlock,
      matches: matches,
      timeState: Object.assign({}, baseVm.timeState || {}, {
        currentPhase: expectedBlockStatus,
        phaseRemainingMs: Number(projectedClock.phaseRemainingMs || 0),
        phaseSequence: Array.isArray(projectedClock.phaseSequence) ? projectedClock.phaseSequence.slice() : ['scheduled', 'live', 'closing', 'transition'],
        tournamentElapsedMs: Number(projectedClock.tournamentElapsedMs || 0),
        pausedAccumulatedMs: Number(projectedClock.pausedAccumulatedMs || 0),
        tournamentNowTs: formatClockStamp(projectedClock.internalNowMs),
        serverNowMs: projectedClock.realNowMs,
        serverNowTs: formatClockStamp(projectedClock.realNowMs),
        timerStatus: projectedClock.isRunning ? 'running' : 'paused',
      }),
      clock: Object.assign({}, baseVm.clock || {}, {
        internalNowTs: formatClockStamp(projectedClock.internalNowMs),
        realNowTs: formatClockStamp(projectedClock.realNowMs),
      }),
    });
  }

  function derivePublicMatchStatus_(match, currentBlock, internalNowMs) {
    const eventState = match && match.eventState && typeof match.eventState === 'object'
      ? match.eventState
      : {};
    const expectedBlockStatus = String(
      currentBlock && currentBlock.visualStatusCode || getExpectedBlockStatus(currentBlock, internalNowMs) || ''
    ).trim();

    if (eventState.tableBlocked) return 'Mesa bloqueada';
    if (eventState.walkover) return 'WO';
    if (eventState.resultSubmitted) return 'Resultado ingresado';
    if (eventState.autoClosed) return 'Cerrado';
    if (expectedBlockStatus === 'scheduled') return 'Programado';
    if (expectedBlockStatus === 'live') return 'En juego';
    if (expectedBlockStatus === 'closing') return 'Cierre en curso';
    if (expectedBlockStatus === 'transition' || expectedBlockStatus === 'closed') return 'Cerrado/Terminado';

    return '';
  }

  function submitDoublesConfigAction(action) {
    submitDoublesConfigActionWithTarget(action, '');
  }

  function submitDoublesConfigActionWithTarget(action, explicitTargetPlayerId) {
    const playerId = getSavedPlayerId();
    const targetPlayerId = String(explicitTargetPlayerId || '').trim();

    if (!playerId) {
      renderDoublesConfigError(new Error('Selecciona tu nombre antes de usar acciones de dobles.'));
      return;
    }

    if (action === 'propose_partner') {
      doublesLoadingTitle = 'Enviando solicitud de partner...';
      doublesLoadingDetail = 'Estamos registrando tu solicitud y actualizando el estado del check-in.';
    } else if (action === 'confirm_partner') {
      doublesLoadingTitle = 'Confirmando partner...';
      doublesLoadingDetail = 'Estamos aceptando la solicitud y actualizando la pareja confirmada.';
    } else if (action === 'reject_partner') {
      doublesLoadingTitle = 'Rechazando solicitud...';
      doublesLoadingDetail = 'Estamos registrando tu respuesta y actualizando el estado del check-in.';
    } else {
      doublesLoadingTitle = 'Actualizando check-in...';
      doublesLoadingDetail = 'Estamos aplicando tu accion y refrescando el estado del jugador seleccionado.';
    }

    doublesIsLoading = true;
    currentDoublesVm = null;
    renderMyDayDoublesEntryCard();
    const root = document.getElementById('doubles-config-content');
    if (root) {
      root.innerHTML = buildDoublesLoadingHtml({
        silent: true,
        title: doublesLoadingTitle,
        detail: doublesLoadingDetail,
      });
    }

    google.script.run
      .withSuccessHandler(function (vm) {
        renderDoublesConfig(vm);
      })
      .withFailureHandler(renderDoublesConfigError)
      .applyDoublesConfigActionFromUi({
        action: action,
        playerId: playerId,
        targetPlayerId: targetPlayerId,
      });

  function buildMyDayVmForClientTime_(vm) {
    const baseVm = vm || {};
    const projectedClock = getProjectedClockSnapshot_();
    const currentBlock = baseVm.currentBlock ? Object.assign({}, baseVm.currentBlock) : null;
    const currentMatch = baseVm.currentMatch ? Object.assign({}, baseVm.currentMatch) : null;

    if (!projectedClock || !currentBlock) {
      return Object.assign({}, baseVm, {
        currentBlock: currentBlock,
        currentMatch: currentMatch,
      });
    }

    const expectedBlockStatus = String(projectedClock.currentPhase || '').trim() || getExpectedBlockStatus(currentBlock, projectedClock.internalNowMs);
    currentBlock.visualStatusCode = expectedBlockStatus;
    currentBlock.visualStatusLabel = formatTournamentStateLabel({ status: expectedBlockStatus });

    if (currentMatch) {
      currentMatch.visualStatus = derivePublicMatchStatus_(currentMatch, currentBlock, projectedClock.internalNowMs);
    }

    return Object.assign({}, baseVm, {
      currentBlock: currentBlock,
      currentMatch: currentMatch,
      timeState: Object.assign({}, baseVm.timeState || {}, {
        currentPhase: expectedBlockStatus,
        phaseRemainingMs: Number(projectedClock.phaseRemainingMs || 0),
        tournamentElapsedMs: Number(projectedClock.tournamentElapsedMs || 0),
        tournamentNowTs: formatClockStamp(projectedClock.internalNowMs),
        serverNowMs: projectedClock.realNowMs,
        serverNowTs: formatClockStamp(projectedClock.realNowMs),
        timerStatus: projectedClock.isRunning ? 'running' : 'paused',
      }),
    });
  }

  function toggleControlHeartbeatMode() {
    controlHeartbeatEnabled = !controlHeartbeatEnabled;
    saveControlHeartbeatEnabled_(controlHeartbeatEnabled);

    if (controlHeartbeatEnabled) {
      updateControlHeartbeatUi();
      startControlHeartbeatLoopIfNeeded_();
      runControlHeartbeatCycle_();
      return;
    }

    stopControlHeartbeatLoop_();
    releaseControlHeartbeatLease_();
    releaseControlHeartbeatWakeLock_();
    controlHeartbeatLeadership = false;
    controlHeartbeatLeaseInfo = null;
    updateControlHeartbeatUi();
  }

  function startControlHeartbeatLoopIfNeeded_() {
    if (!controlHeartbeatEnabled || !isAdminScreenActive_() || document.visibilityState !== 'visible') {
      return;
    }

    const intervalMs = getControlHeartbeatIntervalSeconds_() * 1000;
    const currentInterval = controlHeartbeatTimer && controlHeartbeatTimer.__intervalMs ? controlHeartbeatTimer.__intervalMs : 0;
    if (controlHeartbeatTimer && currentInterval === intervalMs) {
      return;
    }

    stopControlHeartbeatLoop_();
    controlHeartbeatTimer = window.setInterval(runControlHeartbeatCycle_, intervalMs);
    controlHeartbeatTimer.__intervalMs = intervalMs;
    requestControlHeartbeatWakeLock_();
    updateControlHeartbeatUi();
  }

  function stopControlHeartbeatLoop_() {
    if (controlHeartbeatTimer) {
      window.clearInterval(controlHeartbeatTimer);
      controlHeartbeatTimer = null;
    }
  }

  function runControlHeartbeatCycle_() {
    if (!controlHeartbeatEnabled || !isAdminScreenActive_() || document.visibilityState !== 'visible' || controlHeartbeatInFlight) {
      updateControlHeartbeatUi();
      return;
    }

    if (!db) {
      controlHeartbeatLeadership = false;
      controlHeartbeatLeaseInfo = {
        status: 'error',
        detail: 'Firebase no esta disponible para coordinar el dispositivo lider.',
      };
      updateControlHeartbeatUi();
      return;
    }

    controlHeartbeatInFlight = true;
    claimOrRenewControlHeartbeatLease_()
      .then(function (leaseResult) {
        controlHeartbeatLeadership = !!(leaseResult && leaseResult.isLeader);
        controlHeartbeatLeaseInfo = leaseResult || null;
        updateControlHeartbeatUi();

        if (!controlHeartbeatLeadership) {
          releaseControlHeartbeatWakeLock_();
          return null;
        }

        requestControlHeartbeatWakeLock_();
        return runControlHeartbeatServerTick_();
      })
      .catch(function (error) {
        controlHeartbeatLeadership = false;
        controlHeartbeatLeaseInfo = {
          status: 'error',
          detail: error && error.message ? error.message : String(error || 'Error desconocido'),
        };
        updateControlHeartbeatUi();
        releaseControlHeartbeatWakeLock_();
      })
      .finally(function () {
        controlHeartbeatInFlight = false;
      });
  }

  function runControlHeartbeatServerTick_() {
    return new Promise(function (resolve, reject) {
      google.script.run
        .withSuccessHandler(function (result) {
          if (result && result.timeState) {
            updateAppHeaderClockSnapshot(result.timeState);
            if (currentAdminVm) {
              currentAdminVm.timeState = result.timeState;
              currentAdminVm.clockIsRunning = String(result.timeState.timerStatus || '').trim() === 'running';
            }
            updateAdminToggleClockButton(currentAdminVm || { timeState: result.timeState });
          }
          if (result && result.tickResult && result.tickResult.currentBlockStatus) {
            controlHeartbeatLeaseInfo = Object.assign({}, controlHeartbeatLeaseInfo || {}, {
              status: 'active',
              detail: `Heartbeat activo. Motor en ${result.tickResult.currentBlockStatus || 'sin bloque'} a las ${String(result.generatedAt || '').trim() || 'ahora'}.`,
            });
            updateControlHeartbeatUi();
          }
          resolve(result || null);
        })
        .withFailureHandler(function (error) {
          reject(error);
        })
        .runControlHeartbeatFromUi();
    });
  }

  function claimOrRenewControlHeartbeatLease_() {
    return new Promise(function (resolve, reject) {
      if (!db) {
        reject(new Error('Firebase no esta disponible.'));
        return;
      }

      if (!controlHeartbeatLeaseRef) {
        controlHeartbeatLeaseRef = db.ref(CONTROL_HEARTBEAT_LEASE_PATH);
      }

      const nowMs = Date.now();
      const expiresAt = nowMs + CONTROL_HEARTBEAT_LEASE_MS;
      const payload = {
        ownerId: controlHeartbeatClientId,
        ownerLabel: buildControlHeartbeatOwnerLabel_(),
        intervalSeconds: getControlHeartbeatIntervalSeconds_(),
        updatedAt: nowMs,
        expiresAt: expiresAt,
      };

      controlHeartbeatLeaseRef.transaction(function (current) {
        const currentOwnerId = current && current.ownerId ? String(current.ownerId) : '';
        const currentExpiresAt = current && current.expiresAt ? Number(current.expiresAt) : 0;
        if (currentOwnerId && currentOwnerId !== controlHeartbeatClientId && currentExpiresAt > nowMs) {
          return;
        }
        return payload;
      }, function (error, committed, snapshot) {
        if (error) {
          reject(error);
          return;
        }

        const value = snapshot && typeof snapshot.val === 'function' ? snapshot.val() : null;
        const ownerId = value && value.ownerId ? String(value.ownerId) : '';
        const isLeader = ownerId === controlHeartbeatClientId;
        const detail = isLeader
          ? `Lider activo cada ${getControlHeartbeatIntervalSeconds_()} s.`
          : value && value.ownerLabel
            ? `Otro dispositivo liderando: ${value.ownerLabel}.`
            : 'Otro dispositivo esta liderando el heartbeat.';

        resolve({
          isLeader: isLeader,
          committed: !!committed,
          value: value,
          status: isLeader ? 'active' : 'waiting',
          detail: detail,
        });
      }, false);
    });
  }

  function releaseControlHeartbeatLease_() {
    if (!db) return;
    const ref = controlHeartbeatLeaseRef || db.ref(CONTROL_HEARTBEAT_LEASE_PATH);
    ref.transaction(function (current) {
      const currentOwnerId = current && current.ownerId ? String(current.ownerId) : '';
      if (!currentOwnerId || currentOwnerId !== controlHeartbeatClientId) {
        return;
      }
      return null;
    }, function () {}, false);
  }

  async function requestControlHeartbeatWakeLock_() {
    if (!controlHeartbeatEnabled || !controlHeartbeatLeadership || !isAdminScreenActive_() || document.visibilityState !== 'visible') {
      return;
    }

    if (!('wakeLock' in navigator) || !navigator.wakeLock || typeof navigator.wakeLock.request !== 'function') {
      return;
    }

    if (controlHeartbeatWakeLock) {
      return;
    }

    try {
      controlHeartbeatWakeLock = await navigator.wakeLock.request('screen');
      if (controlHeartbeatWakeLock && typeof controlHeartbeatWakeLock.addEventListener === 'function') {
        controlHeartbeatWakeLock.addEventListener('release', function () {
          controlHeartbeatWakeLock = null;
          updateControlHeartbeatUi();
        });
      }
      updateControlHeartbeatUi();
    } catch (error) {
      controlHeartbeatLeaseInfo = Object.assign({}, controlHeartbeatLeaseInfo || {}, {
        status: 'waiting',
        detail: `Heartbeat lider activo, pero no fue posible mantener la pantalla despierta: ${error && error.message ? error.message : String(error)}`,
      });
      updateControlHeartbeatUi();
    }
  }

  function releaseControlHeartbeatWakeLock_() {
    if (!controlHeartbeatWakeLock) return;
    const wakeLock = controlHeartbeatWakeLock;
    controlHeartbeatWakeLock = null;
    if (typeof wakeLock.release === 'function') {
      wakeLock.release().catch(function () {
        // ignore release errors
      });
    }
    updateControlHeartbeatUi();
  }

  function updateControlHeartbeatUi() {
    const toggleButton = document.getElementById('control-heartbeat-toggle-button');
    const intervalInput = document.getElementById('control-heartbeat-interval-input');
    const statusEl = document.getElementById('control-heartbeat-status');
    const detailEl = document.getElementById('control-heartbeat-detail');
    const ledEl = document.getElementById('control-heartbeat-led');
    if (!toggleButton || !intervalInput || !statusEl || !detailEl || !ledEl) return;

    intervalInput.value = String(getControlHeartbeatIntervalSeconds_());
    toggleButton.textContent = controlHeartbeatEnabled ? 'Desactivar modo control' : 'Activar modo control';

    let status = 'off';
    let detail = 'Desactivado. Activalo en este dispositivo para liderar el tick fino del torneo.';

    if (controlHeartbeatEnabled && !isAdminScreenActive_()) {
      status = 'waiting';
      detail = 'Modo preparado. Abre la pantalla de Control para liderar el heartbeat.';
    } else if (controlHeartbeatEnabled && document.visibilityState !== 'visible') {
      status = 'waiting';
      detail = 'Modo preparado. Vuelve a la pestaña visible para retomar liderazgo y wake lock.';
    } else if (controlHeartbeatEnabled && controlHeartbeatLeadership) {
      status = 'active';
      detail = controlHeartbeatLeaseInfo && controlHeartbeatLeaseInfo.detail
        ? controlHeartbeatLeaseInfo.detail
        : `Lider activo cada ${getControlHeartbeatIntervalSeconds_()} s.`;
      if (controlHeartbeatWakeLock) {
        detail += ' Pantalla despierta.';
      } else {
        detail += ' Pantalla despierta no garantizada.';
      }
    } else if (controlHeartbeatEnabled && controlHeartbeatLeaseInfo && controlHeartbeatLeaseInfo.status === 'error') {
      status = 'error';
      detail = controlHeartbeatLeaseInfo.detail || 'No se pudo ejecutar el heartbeat de control.';
    } else if (controlHeartbeatEnabled) {
      status = 'waiting';
      detail = controlHeartbeatLeaseInfo && controlHeartbeatLeaseInfo.detail
        ? controlHeartbeatLeaseInfo.detail
        : 'Buscando liderazgo para ejecutar el heartbeat.';
    }

    detailEl.textContent = detail;
    statusEl.textContent = mapControlHeartbeatStatusLabel_(status);
    ledEl.className = `control-heartbeat-led${status === 'active' ? ' is-active' : ''}${status === 'waiting' ? ' is-waiting' : ''}${status === 'error' ? ' is-error' : ''}`;
  }

  function mapControlHeartbeatStatusLabel_(status) {
    if (status === 'active') return 'Heartbeat lider activo';
    if (status === 'waiting') return 'Heartbeat en espera';
    if (status === 'error') return 'Heartbeat con error';
    return 'Heartbeat inactivo';
  }

  function buildControlHeartbeatOwnerLabel_() {
    const base = getSavedPlayerId() || 'control';
    const suffix = String(controlHeartbeatClientId || '').slice(-4);
    return `${base} · ${suffix}`;

  function getOrCreateControlHeartbeatClientId_() {
    try {
      const existing = window.localStorage.getItem(LOCAL_STORAGE_CONTROL_HEARTBEAT_CLIENT_ID_KEY);
      if (existing) return existing;
      const nextValue = `ctrl-${Math.random().toString(36).slice(2, 10)}-${Date.now().toString(36)}`;
      window.localStorage.setItem(LOCAL_STORAGE_CONTROL_HEARTBEAT_CLIENT_ID_KEY, nextValue);
      return nextValue;
    } catch (error) {
      return `ctrl-${Math.random().toString(36).slice(2, 10)}-${Date.now().toString(36)}`;
    }
  }

  function getStoredControlHeartbeatEnabled_() {
    try {
      return window.localStorage.getItem(LOCAL_STORAGE_CONTROL_HEARTBEAT_ENABLED_KEY) === 'true';
    } catch (error) {
      return false;

  function saveControlHeartbeatEnabled_(enabled) {
    try {
      window.localStorage.setItem(LOCAL_STORAGE_CONTROL_HEARTBEAT_ENABLED_KEY, enabled ? 'true' : 'false');
    } catch (error) {
      // ignore storage failures
    }

  function getControlHeartbeatIntervalSeconds_() {
    const input = document.getElementById('control-heartbeat-interval-input');
    const inputValue = input ? Number(input.value || '') : NaN;
    const storedValue = getStoredControlHeartbeatIntervalSeconds_();
    const resolved = Number.isFinite(inputValue) ? inputValue : storedValue;
    const normalized = Math.min(CONTROL_HEARTBEAT_MAX_SECONDS, Math.max(CONTROL_HEARTBEAT_MIN_SECONDS, Number(resolved || CONTROL_HEARTBEAT_DEFAULT_SECONDS)));
    saveControlHeartbeatIntervalSeconds_(normalized);
    return normalized;
  }

  function getStoredControlHeartbeatIntervalSeconds_() {
    try {
      const raw = Number(window.localStorage.getItem(LOCAL_STORAGE_CONTROL_HEARTBEAT_INTERVAL_KEY) || '');
      return Number.isFinite(raw) ? raw : CONTROL_HEARTBEAT_DEFAULT_SECONDS;
    } catch (error) {
      return CONTROL_HEARTBEAT_DEFAULT_SECONDS;
    }
  }

  function saveControlHeartbeatIntervalSeconds_(value) {
    try {
      window.localStorage.setItem(LOCAL_STORAGE_CONTROL_HEARTBEAT_INTERVAL_KEY, String(value));

  }

  function updateMyDayClockHud(forceRefreshCheck) {
    const phaseGadgetEl = document.getElementById('myday-phase-gadget');
    const phaseEl = document.getElementById('myday-clock-phase');

    if (!phaseGadgetEl || !phaseEl) {
      return;
    }

    const vm = currentMyDayVm;
    const snapshotState = myDayClockSnapshot || {};
    const snapshot = getProjectedClockSnapshot_();
    const clockHealth = String(snapshot && snapshot.health || 'ok');
    const clockHealthMessage = String(snapshot && snapshot.healthMessage || '');

    if (!vm || !snapshot || (!snapshot.internalNowMs && clockHealth !== 'missing_start_ts')) {
      renderMyDayPhaseGadget_(phaseGadgetEl, {
        ledClass: 'public-phase-gadget__led public-phase-gadget__led--idle',
        label: 'Sincronizacion',
        countdown: '--:--:--',
      });
      phaseEl.textContent = 'Selecciona un jugador para ver su jornada.';
      return;
    }

    if (clockHealth === 'missing_start_ts' || clockHealth === 'invalid_anchor') {
      renderMyDayPhaseGadget_(phaseGadgetEl, {
        ledClass: 'public-phase-gadget__led public-phase-gadget__led--idle',
        label: 'Config invalida',
        countdown: '--:--:--',
      });
      phaseEl.textContent = clockHealthMessage || 'Falta configurar tournament_start_ts.';
      return;
    }

    const internalNowMs = snapshot.internalNowMs;
    const currentBlock = vm.currentBlock || null;
    const expectedStatus = getExpectedBlockStatus(currentBlock, internalNowMs);
    const phase = String(snapshot.currentPhase || expectedStatus || '').trim();
    const remainingMs = Math.max(0, Number(snapshot.phaseRemainingMs || 0));
    const state = buildPublicPhaseGadgetState_(
      phase,
      remainingMs,
      String(vm.tournamentStatus || '').trim(),
      !!snapshot.isRunning
    );

    renderMyDayPhaseGadget_(phaseGadgetEl, state);
    phaseEl.textContent = currentBlock
      ? `Bloque ${currentBlock.id} - ${String(currentBlock.phaseLabel || '').trim() || formatTournamentStateLabel({ status: expectedStatus || '' })}`
      : 'Sin bloque activo';

    if (currentBlock && (forceRefreshCheck || phase !== snapshotState.lastPhaseKey)) {
      snapshotState.lastPhaseKey = phase;
      myDayClockSnapshot = snapshotState;
    }
  }

  function formatTournamentStateLabel(currentBlock) {
    if (!currentBlock) return 'Sin actividad';
    const status = String(currentBlock.status || '');

    if (status === 'live') return 'En curso';
    if (status === 'scheduled') return 'Programado';
    if (status === 'closing') return 'Cierre';
    if (status === 'transition') return 'Transicion';
    if (status === 'closed') return 'Cerrado';

    return status || 'Bloque';
  }

  function getExpectedBlockStatus(currentBlock, internalNowMs) {
    if (!currentBlock) return '';

    const startMs = parseCanonicalDateTime(currentBlock.startTs);
    const closeMs = parseCanonicalDateTime(currentBlock.closeSignalTs);
    const hardMs = parseCanonicalDateTime(currentBlock.hardCloseTs);
    const endMs = parseCanonicalDateTime(currentBlock.endTs);

    if (!startMs || internalNowMs < startMs) return 'scheduled';
    if (closeMs && internalNowMs < closeMs) return 'live';
    if (hardMs && internalNowMs < hardMs) return 'closing';
    if (endMs && internalNowMs < endMs) return 'transition';
    if (endMs && internalNowMs >= endMs) return 'closed';

    return '';
  }

  function getNextBlockMilestone(currentBlock, internalNowMs) {
    if (!currentBlock) {
      return {
        label: 'Proximo hito',
        value: 'Sin bloque activo',
      };
    }

    const milestones = [
      { key: 'start', label: 'Inicio', at: parseCanonicalDateTime(currentBlock.startTs) },
      { key: 'close', label: 'Cierre', at: parseCanonicalDateTime(currentBlock.closeSignalTs) },
      { key: 'transition', label: 'Transicion', at: parseCanonicalDateTime(currentBlock.hardCloseTs) },
      { key: 'fin', label: 'Fin de bloque', at: parseCanonicalDateTime(currentBlock.endTs) },
    ].filter(function (item) {
      return !!item.at;
    });

    for (let i = 0; i < milestones.length; i++) {
      if (internalNowMs < milestones[i].at) {
        return {
          label: milestones[i].label,
          value: formatCountdown(milestones[i].at - internalNowMs),
        };
      }
    }

    return {
      label: 'Proximo hito',
      value: 'Esperando refresh del siguiente bloque',
    };
  }

  function submitCapturePayload(payload, triggerEl) {

      .withSuccessHandler(function () {

        loadPublicScreen({ silent: true });

      .withFailureHandler(function (err) {
        setCaptureSubmittingState(false);

        errorBox.textContent = err.message || String(err);

      .submitMatchResultFromUi({
        matchId: m.matchId,

        setsB: payload.setsB,
        closingState: payload.closingState,
        actorPlayerId: playerId,
        actorRole: actorRole

  function setCaptureSubmittingState(isSubmitting, triggerEl, payload) {
    const buttons = document.querySelectorAll('#capture-modal-overlay .capture-action');
    const closeButton = document.querySelector('#capture-modal-overlay .capture-close');
    const feedbackBox = document.getElementById('capture-feedback');

    buttons.forEach(function (button) {
      button.disabled = isSubmitting;
      button.classList.remove('is-pressed');

    if (closeButton) {
      closeButton.disabled = isSubmitting;

    if (isSubmitting && triggerEl) {

    if (!isSubmitting) {
      feedbackBox.style.display = 'none';
      feedbackBox.textContent = '';

    feedbackBox.textContent = buildCaptureSubmittingLabel(payload);

  function parseCanonicalDateTime(value) {
    let text = String(value || '').trim();
    if (!text) return 0;
    if (text.charAt(0) === "'") {
      text = text.slice(1).trim();
    }

    const match = text.match(/^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})$/);
    if (!match) return 0;

    return Date.UTC(
      Number(match[1]),
      Number(match[2]) - 1,
      Number(match[3]),
      Number(match[4]),
      Number(match[5]),
      Number(match[6])
    );
  }

  function formatElapsedClock(milliseconds) {
    const safe = Math.max(0, Number(milliseconds) || 0);
    const totalSeconds = Math.floor(safe / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    return [
      String(hours).padStart(2, '0'),
      String(minutes).padStart(2, '0'),
      String(seconds).padStart(2, '0'),
    ].join(':');
  }

  function formatCountdown(milliseconds) {
    return formatElapsedClock(milliseconds);
  }

  function formatRelativeSeconds(milliseconds) {
    const seconds = Math.max(0, Math.floor((Number(milliseconds) || 0) / 1000));
    return seconds + ' s';
  }

  function formatClockTime(milliseconds) {
    if (!milliseconds) return '--:--:--';

    const date = new Date(milliseconds);
    return [
      String(date.getUTCHours()).padStart(2, '0'),
      String(date.getUTCMinutes()).padStart(2, '0'),
      String(date.getUTCSeconds()).padStart(2, '0'),
    ].join(':');
  }

  function formatClockStamp(milliseconds) {
    if (!milliseconds) return '--';

    const date = new Date(milliseconds);
    const yyyy = String(date.getUTCFullYear());
    const mm = String(date.getUTCMonth() + 1).padStart(2, '0');
    const dd = String(date.getUTCDate()).padStart(2, '0');

    return `${yyyy}-${mm}-${dd} ${formatClockTime(milliseconds)}`;
  }

  function savePlayerId(playerId) {
    try {
      localStorage.setItem(LOCAL_STORAGE_PLAYER_KEY, String(playerId || ''));
    } catch (e) {
      console.warn('No se pudo guardar player_id en localStorage', e);
    }
  }

  function getSavedPlayerId() {
    try {
      return localStorage.getItem(LOCAL_STORAGE_PLAYER_KEY) || '';
    } catch (e) {
      return '';
    }
  }

  function saveGroupsPlayerId(playerId) {
    try {
      localStorage.setItem(LOCAL_STORAGE_GROUPS_PLAYER_KEY, String(playerId || ''));
    } catch (e) {
      console.warn('No se pudo guardar player_id de grupos en localStorage', e);
    }
  }

  function getSavedGroupsPlayerId() {
    try {
      return localStorage.getItem(LOCAL_STORAGE_GROUPS_PLAYER_KEY) || '';
    } catch (e) {
      return '';
    }
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>
