<script>
  const PUBLIC_REFRESH_MS = 10000;
  const PUBLIC_REALTIME_BOOT_TIMEOUT_MS = 3000;
  const MYDAY_REFRESH_MS = 5000;
  const CLIENT_CLOCK_TICK_MS = 1000;
  const LOCAL_STORAGE_PLAYER_KEY = 'ttm_selected_player_id';
  const LOCAL_STORAGE_GROUPS_PLAYER_KEY = 'ttm_groups_selected_player_id';
  const LOCAL_STORAGE_SCREEN_KEY = 'ttm_active_screen';
  const LOCAL_STORAGE_CONTROL_HEARTBEAT_ENABLED_KEY = 'ttm_control_heartbeat_enabled';
  const LOCAL_STORAGE_CONTROL_HEARTBEAT_INTERVAL_KEY = 'ttm_control_heartbeat_interval_seconds';
  const LOCAL_STORAGE_CONTROL_HEARTBEAT_CLIENT_ID_KEY = 'ttm_control_heartbeat_client_id';
  const CONTROL_HEARTBEAT_DEFAULT_SECONDS = 5;
  const CONTROL_HEARTBEAT_MIN_SECONDS = 3;
  const CONTROL_HEARTBEAT_MAX_SECONDS = 30;
  const CONTROL_HEARTBEAT_LEASE_MS = 15000;
  const FIREBASE_CONFIG = {
    apiKey: 'AIzaSyB1Nrl8x_wJqBzy1uzqLGOdM243h8Dw6Fw',
    authDomain: 'appttour.firebaseapp.com',
    projectId: 'appttour',
    storageBucket: 'appttour.firebasestorage.app',
    messagingSenderId: '298018962537',
    appId: '1:298018962537:web:88606ac251f2d7b904f6f8',
    measurementId: 'G-E1L3YDJEMS',
  };

  let publicRefreshTimer = null;
  let publicLoadInFlight = false;
  let publicLastSuccessAt = null;
  let publicRealtimeSnapshotReceived = false;
  let publicRealtimeBootstrapTimer = null;
  let currentPublicVm = null;
  let publicLastDerivedBlockId = '';
  let publicLastDerivedBlockStatus = '';
  let currentMyDayVm = null;
  let currentSinglesGroupsVm = null;
  let currentDoublesVm = null;
  let currentAdminVm = null;
  let adminActionInFlight = false;
  let myDayRefreshTimer = null;
  let myDayLoadInFlight = false;
  let myDayHeartbeatInFlight = false;
  let myDayLastSuccessAt = null;
  let myDayLastErrorMessage = '';
  let myDayClockTimer = null;
  let myDayClockSnapshot = null;
  let doublesLoadRequestSeq = 0;
  let doublesLoadRequestActive = 0;
  let doublesIsLoading = false;
  let doublesLoadingTitle = '';
  let doublesLoadingDetail = '';
  let db = null;
  let realtimeMatchesRef = null;
  let realtimeMyDayRef = null;
  let realtimeDoublesRef = null;
  let realtimeListenerAttached = false;
  let realtimeMyDayPlayerId = '';
  let realtimeDoublesPlayerId = '';
  let lastRealtimePayload = null;
  let lastRealtimeMatches = [];
  let appHeaderClockSnapshot = null;
  let controlHeartbeatEnabled = false;
  let controlHeartbeatTimer = null;
  let controlHeartbeatInFlight = false;
  let controlHeartbeatClientId = '';
  let controlHeartbeatLeadership = false;
  let controlHeartbeatLeaseRef = null;
  let controlHeartbeatLeaseInfo = null;
  let controlHeartbeatWakeLock = null;

  document.addEventListener('DOMContentLoaded', function () {
    initializeControlHeartbeatState();
    initializeAppScreens();
    initializeFirebaseRealtime();
    startPublicScreenBootstrap_();
    startClientClockTicker();
    loadPlayerSelector();
    loadSinglesGroupsConfig();
    loadDoublesConfig();
    loadAdminControl();
    bindControlHeartbeatLifecycle();
  });

  function initializeAppScreens() {
    const savedScreen = getSavedAppScreen();
    setActiveAppScreen(savedScreen || 'public');
  }

  function initializeControlHeartbeatState() {
    controlHeartbeatEnabled = getStoredControlHeartbeatEnabled_();
    controlHeartbeatClientId = getOrCreateControlHeartbeatClientId_();
  }

  function bindControlHeartbeatLifecycle() {
    const intervalInput = document.getElementById('control-heartbeat-interval-input');
    if (intervalInput) {
      intervalInput.addEventListener('change', function () {
        getControlHeartbeatIntervalSeconds_();
        if (controlHeartbeatEnabled) {
          startControlHeartbeatLoopIfNeeded_();
          runControlHeartbeatCycle_();
        } else {
          updateControlHeartbeatUi();
        }
      });
    }

    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible') {
        if (controlHeartbeatEnabled) {
          updateControlHeartbeatUi();
          startControlHeartbeatLoopIfNeeded_();
          requestControlHeartbeatWakeLock_();
          runControlHeartbeatCycle_();
        }
        return;
      }

      releaseControlHeartbeatWakeLock_();
    });

    window.addEventListener('beforeunload', function () {
      releaseControlHeartbeatLease_();
      releaseControlHeartbeatWakeLock_();
    });
  }

  function getSavedAppScreen() {
    try {
      return window.localStorage.getItem(LOCAL_STORAGE_SCREEN_KEY) || 'public';
    } catch (error) {
      return 'public';
    }
  }

  function saveAppScreen(screen) {
    try {
      window.localStorage.setItem(LOCAL_STORAGE_SCREEN_KEY, screen);
    } catch (error) {
      // ignore storage failures
    }
  }

  function setActiveAppScreen(screen) {
    const nextScreen = String(screen || 'public').trim() || 'public';
    const tabs = document.querySelectorAll('[data-screen-tab]');
    const panels = document.querySelectorAll('[data-screen-panel]');
    const activeTabScreen = resolveParentScreenForTabs(nextScreen);

    tabs.forEach(function (tab) {
      const isActive = tab.getAttribute('data-screen-tab') === activeTabScreen;
      tab.classList.toggle('is-active', isActive);
      tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });

    panels.forEach(function (panel) {
      const isActive = panel.getAttribute('data-screen-panel') === nextScreen;
      panel.classList.toggle('is-active', isActive);
      panel.hidden = !isActive;
    });

    saveAppScreen(nextScreen);
    if (nextScreen === 'groups') {
      loadSinglesGroupsConfig({ silent: true });
    }
    if (nextScreen === 'myday') {
      refreshCurrentPlayerExperience({ silent: true });
    }
    if (nextScreen === 'doubles') {
      refreshCurrentPlayerExperience({ silent: true });
    }
    handleControlHeartbeatScreenChange_();
    window.scrollTo({ top: 0, behavior: 'auto' });
  }

  function resolveParentScreenForTabs(screen) {
    const value = String(screen || '').trim();
    if (value === 'doubles') return 'myday';
    if (value === 'groups') return 'admin';
    return value || 'public';
  }

  function handleControlHeartbeatScreenChange_() {
    if (isAdminScreenActive_()) {
      updateControlHeartbeatUi();
      startControlHeartbeatLoopIfNeeded_();
      return;
    }

    stopControlHeartbeatLoop_();
    releaseControlHeartbeatWakeLock_();
  }

  function isAdminScreenActive_() {
    if (getSavedAppScreen() === 'admin') return true;
    const adminPanel = document.querySelector('[data-screen-panel="admin"]');
    return !!(adminPanel && adminPanel.classList.contains('is-active') && !adminPanel.hidden);
  }

  function shouldLoadDoublesConfigForCurrentSelection() {
    const playerId = getSavedPlayerId();
    if (!playerId) return false;
    if (doublesIsLoading) return false;

    const actorId = currentDoublesVm && currentDoublesVm.actor
      ? String(currentDoublesVm.actor.id || '').trim()
      : '';

    return actorId !== playerId;
  }

  function startPublicAutoRefresh() {
    stopPublicAutoRefresh();

    if (realtimeListenerAttached) {
      setRefreshIndicator('Sincronizacion en tiempo real activada');
      return;
    }

    publicRefreshTimer = window.setInterval(function () {
      loadPublicScreen({ silent: true });
    }, PUBLIC_REFRESH_MS);

    setRefreshIndicator('Actualización automática activada');
  }

  function startPublicScreenBootstrap_() {
    clearPublicRealtimeBootstrapTimer_();

    if (!realtimeListenerAttached) {
      loadPublicScreen();
      return;
    }

    setRefreshIndicator('Conectando pantalla publica con Firebase...');
    publicRealtimeBootstrapTimer = window.setTimeout(function () {
      if (publicRealtimeSnapshotReceived) return;
      loadPublicScreen();
    }, PUBLIC_REALTIME_BOOT_TIMEOUT_MS);
  }

  function clearPublicRealtimeBootstrapTimer_() {
    if (!publicRealtimeBootstrapTimer) return;
    window.clearTimeout(publicRealtimeBootstrapTimer);
    publicRealtimeBootstrapTimer = null;
  }

  function stopPublicAutoRefresh() {
    if (publicRefreshTimer) {
      window.clearInterval(publicRefreshTimer);
      publicRefreshTimer = null;
    }
  }

  function startMyDayAutoRefresh() {
    stopMyDayAutoRefresh();

    myDayRefreshTimer = window.setInterval(function () {
      refreshCurrentPlayerExperience({ silent: true });
    }, MYDAY_REFRESH_MS);
  }

  function stopMyDayAutoRefresh() {
    if (myDayRefreshTimer) {
      window.clearInterval(myDayRefreshTimer);
      myDayRefreshTimer = null;
    }
  }

  function startClientClockTicker() {
    stopClientClockTicker();

    myDayClockTimer = window.setInterval(function () {
      updateAppHeaderClock();
      updateMyDayClockHud();
    }, CLIENT_CLOCK_TICK_MS);
  }

  function stopClientClockTicker() {
    if (myDayClockTimer) {
      window.clearInterval(myDayClockTimer);
      myDayClockTimer = null;
    }
  }

  function loadPublicScreen(options) {
    const opts = options || {};
    const silent = !!opts.silent;

    if (publicLoadInFlight) return;

    publicLoadInFlight = true;
    setRefreshIndicator(silent ? 'Actualizando...' : 'Cargando datos...');

    google.script.run
      .withSuccessHandler(function (vm) {
        publicLoadInFlight = false;
        publicLastSuccessAt = new Date();
        const realtimeVm = buildRealtimePublicVmIfFresh_(vm);
        renderPublicScreen(realtimeVm || vm);
        setRefreshIndicator(buildRefreshIndicatorText());
      })
      .withFailureHandler(function (error) {
        publicLoadInFlight = false;
        renderPublicScreenError(error);
        setRefreshIndicator('Error al actualizar');
      })
      .getPublicViewModel();
  }

  function renderPublicScreen(vm) {
    currentPublicVm = vm;
    updateAppHeaderClockSnapshot(vm && vm.clock ? vm.clock : null);
    renderPublicScreenAtClientTime_();
  }

  function renderPublicScreenAtClientTime_() {
    const vm = buildPublicVmForClientTime_(currentPublicVm);
    renderTopStats(vm);
    renderPublicDebug(vm);
    renderPublicMatches(vm);
  }

  function renderPublicDebug(vm) {
    const root = document.getElementById('public-debug-indicator');
    if (!root) return;

    const snapshotVersion = getSnapshotVersion_(vm && (vm.snapshotVersion || vm.generatedAt)) || '-';
    const internalNowTs = vm && vm.clock ? String(vm.clock.internalNowTs || '').trim() : '';
    const blockStatus = vm && vm.currentBlock ? String(vm.currentBlock.status || '').trim() : '';
    const generatedAt = vm ? String(vm.generatedAt || '').trim() : '';

    root.textContent = `snapshot ${snapshotVersion} | interna ${internalNowTs || '-'} | bloque ${blockStatus || '-'} | payload ${generatedAt || '-'}`;
  }

  function initializeFirebaseRealtime() {
    if (typeof firebase === 'undefined' || !firebase || typeof firebase.initializeApp !== 'function') {
      console.warn('Firebase compat no esta disponible en el cliente.');
      startPublicAutoRefresh();
      startMyDayAutoRefresh();
      return;
    }

    try {
      if (!firebase.apps || !firebase.apps.length) {
        firebase.initializeApp(FIREBASE_CONFIG);
      }

      db = firebase.database();
      subscribeRealtimeMatches();
    } catch (error) {
      console.error('No fue posible inicializar Firebase Realtime Database.', error);
      startPublicAutoRefresh();
      startMyDayAutoRefresh();
    }
  }

  function subscribeRealtimeMatches() {
    if (!db || realtimeListenerAttached) return;

    realtimeMatchesRef = db.ref('partidos');
    realtimeMatchesRef.on('value', function (snapshot) {
      publicRealtimeSnapshotReceived = true;
      clearPublicRealtimeBootstrapTimer_();
      lastRealtimePayload = snapshot ? snapshot.val() : null;
      lastRealtimeMatches = normalizeRealtimeMatchesPayload(lastRealtimePayload);
      const realtimeMeta = extractRealtimePublicMeta(lastRealtimePayload);
      if (!shouldApplyRealtimePublicMeta_(realtimeMeta, currentPublicVm)) {
        setRefreshIndicator('Esperando snapshot realtime mas reciente...');
        return;
      }
      applyRealtimeMatchesToViews(lastRealtimeMatches);
      setRefreshIndicator(lastRealtimeMatches.length ? 'Sincronizado en tiempo real' : 'Esperando asignación de mesas');
    }, function (error) {
      console.error('Error al escuchar partidos en Firebase.', error);
      clearPublicRealtimeBootstrapTimer_();
      if (!publicRefreshTimer) {
        startPublicAutoRefresh();
      }
    });

    realtimeListenerAttached = true;
  }

  function subscribeRealtimeViewModels(playerId) {
    const normalizedPlayerId = String(playerId || '').trim();

    if (!db || !normalizedPlayerId) {
      unsubscribeRealtimeViewModels();
      return;
    }

    subscribeRealtimeMyDay(normalizedPlayerId);
    subscribeRealtimeDoubles(normalizedPlayerId);
  }

  function unsubscribeRealtimeViewModels() {
    unsubscribeRealtimeMyDay();
    unsubscribeRealtimeDoubles();
  }

  function subscribeRealtimeMyDay(playerId) {
    const normalizedPlayerId = String(playerId || '').trim();
    if (!db || !normalizedPlayerId) return;
    if (realtimeMyDayRef && realtimeMyDayPlayerId === normalizedPlayerId) return;

    unsubscribeRealtimeMyDay();
    realtimeMyDayPlayerId = normalizedPlayerId;
    realtimeMyDayRef = db.ref(`players/${normalizedPlayerId}/myDay`);
    realtimeMyDayRef.on('value', function (snapshot) {
      const vm = snapshot ? snapshot.val() : null;
      if (!vm) return;
      myDayLastSuccessAt = new Date();
      myDayLastErrorMessage = '';
      renderMyDay(vm);
    }, function (error) {
      console.error('Error al escuchar myDay en Firebase.', error);
    });
  }

  function unsubscribeRealtimeMyDay() {
    if (realtimeMyDayRef) {
      realtimeMyDayRef.off('value');
      realtimeMyDayRef = null;
    }
    realtimeMyDayPlayerId = '';
  }

  function subscribeRealtimeDoubles(playerId) {
    const normalizedPlayerId = String(playerId || '').trim();
    if (!db || !normalizedPlayerId) return;
    if (realtimeDoublesRef && realtimeDoublesPlayerId === normalizedPlayerId) return;

    unsubscribeRealtimeDoubles();
    realtimeDoublesPlayerId = normalizedPlayerId;
    realtimeDoublesRef = db.ref(`doubles/viewModels/${normalizedPlayerId}`);
    realtimeDoublesRef.on('value', function (snapshot) {
      const vm = snapshot ? snapshot.val() : null;
      if (!vm) return;
      renderDoublesConfig(vm);
    }, function (error) {
      console.error('Error al escuchar dobles en Firebase.', error);
    });
  }

  function unsubscribeRealtimeDoubles() {
    if (realtimeDoublesRef) {
      realtimeDoublesRef.off('value');
      realtimeDoublesRef = null;
    }
    realtimeDoublesPlayerId = '';
  }

  function normalizeRealtimeMatchesPayload(payload) {
    if (!payload) return [];

    if (Array.isArray(payload)) {
      return payload.filter(Boolean);
    }

    if (payload.publicViewModel && Array.isArray(payload.publicViewModel.matches)) {
      return payload.publicViewModel.matches.filter(Boolean);
    }

    if (Array.isArray(payload.matches)) {
      return payload.matches.filter(Boolean);
    }

    if (payload.matches && typeof payload.matches === 'object') {
      return Object.keys(payload.matches).map(function (key) {
        const item = payload.matches[key] || {};
        return Object.assign({ matchId: item.matchId || key }, item);
      });
    }

    if (typeof payload === 'object') {
      return Object.keys(payload).map(function (key) {
        const item = payload[key] || {};
        return Object.assign({ matchId: item.matchId || key }, item);
      }).filter(function (item) {
        return item && (item.matchId || item.id);
      });
    }

    return [];
  }

  function applyRealtimeMatchesToViews(matches, options) {
    const opts = options || {};
    const safeMatches = Array.isArray(matches) ? matches.slice() : [];
    const nextPublicVm = buildPublicVmFromRealtimeMatches(safeMatches, opts);
    if (!shouldApplyRealtimePublicMeta_(extractRealtimePublicMeta(lastRealtimePayload), currentPublicVm)) {
      return;
    }

    renderPublicScreen(nextPublicVm);
    syncRealtimeMatchIntoMyDay(safeMatches, nextPublicVm);
  }

  function buildPublicVmFromRealtimeMatches(matches, options) {
    const opts = options || {};
    const baseVm = currentPublicVm || {};
    const realtimeMeta = extractRealtimePublicMeta(lastRealtimePayload);
    const generatedAt = opts.preserveGeneratedAt && baseVm.generatedAt
      ? baseVm.generatedAt
      : realtimeMeta.generatedAt || formatRealtimeGeneratedAt();

    return {
      tournamentStatus: realtimeMeta.tournamentStatus || baseVm.tournamentStatus || 'live',
      currentBlock: realtimeMeta.currentBlock || baseVm.currentBlock || null,
      clock: realtimeMeta.clock || baseVm.clock || null,
      matches: matches,
      generatedAt: generatedAt,
      snapshotVersion: realtimeMeta.snapshotVersion || generatedAt,
    };
  }

  function extractRealtimePublicMeta(payload) {
    if (!payload || typeof payload !== 'object') {
      return {
        tournamentStatus: '',
        currentBlock: null,
        generatedAt: '',
        snapshotVersion: '',
      };
    }

    const source = payload.publicViewModel && typeof payload.publicViewModel === 'object'
      ? payload.publicViewModel
      : payload;

    return {
      tournamentStatus: String(source.tournamentStatus || '').trim(),
      currentBlock: source.currentBlock || null,
      generatedAt: String(source.generatedAt || '').trim(),
      snapshotVersion: String(source.snapshotVersion || source.generatedAt || '').trim(),
      clock: source.clock || null,
      source: String(source.source || '').trim(),
    };
  }

  function buildRealtimePublicVmIfFresh_(baseVm) {
    if (!lastRealtimeMatches.length && !lastRealtimePayload) {
      return null;
    }

    const realtimeMeta = extractRealtimePublicMeta(lastRealtimePayload);
    if (!shouldApplyRealtimePublicMeta_(realtimeMeta, baseVm)) {
      return null;
    }

    return buildPublicVmFromRealtimeMatches(lastRealtimeMatches, {});
  }

  function shouldApplyRealtimePublicMeta_(realtimeMeta, baseVm) {
    const nextVersion = getSnapshotVersion_(realtimeMeta && (realtimeMeta.snapshotVersion || realtimeMeta.generatedAt));
    const baseVersion = getSnapshotVersion_(baseVm && (baseVm.snapshotVersion || baseVm.generatedAt));

    if (!nextVersion) return true;
    if (!baseVersion) return true;
    return nextVersion >= baseVersion;
  }

  function getSnapshotVersion_(value) {
    return String(value || '').trim();
  }

  function updateAppHeaderClockSnapshot(clock) {
    if (!clock) return;

    const receivedAtMs = Date.now();
    const previousProjectedSnapshot = getProjectedClockSnapshot_();
    let nextInternalNowMs = parseCanonicalDateTime(clock.internalNowTs);
    let nextRealNowMs = parseCanonicalDateTime(clock.realNowTs);
    const nextIsRunning = !!clock.isRunning;

    if (
      previousProjectedSnapshot &&
      previousProjectedSnapshot.internalNowMs &&
      previousProjectedSnapshot.isRunning &&
      nextIsRunning &&
      previousProjectedSnapshot.internalNowMs > nextInternalNowMs
    ) {
      nextInternalNowMs = previousProjectedSnapshot.internalNowMs;
      nextRealNowMs = Math.max(nextRealNowMs || 0, previousProjectedSnapshot.realNowMs || 0);
    }

    appHeaderClockSnapshot = {
      tournamentStartMs: parseCanonicalDateTime(clock.tournamentStartTs),
      internalNowMs: nextInternalNowMs,
      realNowMs: nextRealNowMs,
      internalNowTs: String(clock.internalNowTs || '').trim(),
      isRunning: nextIsRunning,
      health: String(clock.clockHealth || 'ok'),
      healthMessage: String(clock.clockHealthMessage || ''),
      triggerLastRunAt: String(clock.triggerLastRunAt || '').trim(),
      receivedAtMs: receivedAtMs,
    };

    updateAppHeaderClock();
  }

  function getProjectedClockSnapshot_() {
    const snapshot = appHeaderClockSnapshot;
    if (!snapshot || !snapshot.internalNowMs) {
      return null;
    }

    const referenceReceivedAtMs = snapshot.receivedAtMs || Date.now();
    const driftMs = snapshot.isRunning
      ? Math.max(0, Date.now() - referenceReceivedAtMs)
      : 0;
    const internalNowMs = snapshot.internalNowMs + driftMs;
    const realNowMs = (snapshot.realNowMs || referenceReceivedAtMs) + driftMs;

    return Object.assign({}, snapshot, {
      internalNowMs: internalNowMs,
      realNowMs: realNowMs,
      internalNowTs: formatClockStamp(internalNowMs),
    });
  }

  function updateAppHeaderClock() {
    const root = document.getElementById('app-clock-header');
    if (!root) return;

    const snapshot = getProjectedClockSnapshot_() || appHeaderClockSnapshot;
    if (!snapshot || !snapshot.tournamentStartMs || !snapshot.internalNowMs) {
      root.textContent = 'Cronometro del torneo: --:--:-- | Estado: sin snapshot | Hora interna: -';
      return;
    }

    const internalNowMs = snapshot.internalNowMs;
    const elapsedSinceStartMs = Math.max(0, internalNowMs - snapshot.tournamentStartMs);
    const runningLabel = snapshot.isRunning ? 'corriendo' : 'pausado';
    const healthSuffix = snapshot.health && snapshot.health !== 'ok' ? ` | ${snapshot.healthMessage || snapshot.health}` : '';

    root.textContent = `Cronometro del torneo: ${formatElapsedClock(elapsedSinceStartMs)} | Estado: ${runningLabel} | Hora interna: ${formatClockStamp(internalNowMs)}${healthSuffix}`;

    if (currentPublicVm && getSavedAppScreen() === 'public') {
      renderPublicScreenAtClientTime_();
    }
  }

  function formatRealtimeGeneratedAt() {
    const now = new Date();
    const pad = function (value) {
      return String(value).padStart(2, '0');
    };

    return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  }

  function syncRealtimeMatchIntoMyDay(matches, publicVm) {
    if (!currentMyDayVm || !currentMyDayVm.currentMatch) return;

    const currentMatchId = String(currentMyDayVm.currentMatch.matchId || currentMyDayVm.currentMatch.id || '').trim();
    if (!currentMatchId) return;

    const updatedMatch = matches.find(function (match) {
      const matchId = String(match && (match.matchId || match.id) || '').trim();
      return matchId === currentMatchId;
    });

    if (!updatedMatch) return;

    currentMyDayVm = Object.assign({}, currentMyDayVm, {
      currentBlock: publicVm && publicVm.currentBlock ? publicVm.currentBlock : currentMyDayVm.currentBlock,
      generatedAt: publicVm && publicVm.generatedAt ? publicVm.generatedAt : currentMyDayVm.generatedAt,
      currentMatch: Object.assign({}, currentMyDayVm.currentMatch, mapRealtimeMatchToMyDayMatch(currentMyDayVm.currentMatch, updatedMatch)),
    });

    renderMyDay(currentMyDayVm);
  }

  function mapRealtimeMatchToMyDayMatch(baseMatch, realtimeMatch) {
    const nextStatus = String(realtimeMatch && (realtimeMatch.matchStatus || realtimeMatch.status) || baseMatch.matchStatus || '').trim();
    const nextResultMode = String(realtimeMatch && realtimeMatch.resultMode || baseMatch.resultMode || '').trim();
    const nextClosingState = String(realtimeMatch && realtimeMatch.closingState || baseMatch.closingState || '').trim();

    return {
      tableNo: realtimeMatch && realtimeMatch.tableNo != null ? realtimeMatch.tableNo : baseMatch.tableNo,
      phaseLabel: realtimeMatch && realtimeMatch.phaseLabel ? realtimeMatch.phaseLabel : baseMatch.phaseLabel,
      leftLabel: realtimeMatch && realtimeMatch.leftLabel ? realtimeMatch.leftLabel : baseMatch.leftLabel,
      rightLabel: realtimeMatch && realtimeMatch.rightLabel ? realtimeMatch.rightLabel : baseMatch.rightLabel,
      matchupLabel: realtimeMatch && realtimeMatch.matchupLabel ? realtimeMatch.matchupLabel : baseMatch.matchupLabel,
      matchStatus: nextStatus,
      resultMode: nextResultMode,
      closingState: nextClosingState,
      isByeAdvance: typeof realtimeMatch.isByeAdvance === 'boolean' ? realtimeMatch.isByeAdvance : baseMatch.isByeAdvance,
      allowedCaptureActions: Object.assign({}, baseMatch.allowedCaptureActions, deriveCaptureActionsFromRealtimeStatus(nextStatus)),
    };
  }

  function deriveCaptureActionsFromRealtimeStatus(status) {
    const normalized = String(status || '').trim();
    const isClosed = normalized === 'result_submitted' || normalized === 'auto_closed';

    return {
      canOpen: !isClosed,
      canSubmitFinal: !isClosed,
      canSubmitClosingState: !isClosed,
    };
  }

  function renderTopStats(vm) {
    document.getElementById('stat-status').textContent = vm.tournamentStatus || '—';
    document.getElementById('stat-block').textContent = vm.currentBlock ? vm.currentBlock.id : '—';
    document.getElementById('stat-phase').textContent = vm.currentBlock ? vm.currentBlock.phaseLabel : '—';
    document.getElementById('stat-updated').textContent = vm.generatedAt || '—';
  }

  function renderPublicMatches(vm) {
    const root = document.getElementById('public-screen-content');
    const emptyMessage = 'Esperando asignación de mesas';

    if (!vm.currentBlock) {
      root.innerHTML = `<div class="empty">${emptyMessage}</div>`;
      return;
    }

    if (!vm.matches || vm.matches.length === 0) {
      root.innerHTML = `<div class="empty">${emptyMessage}</div>`;
      return;
    }

    const html = vm.matches.map(function (match) {
      return `
        <article class="match-item">
          <div class="row-between">
            <div>
              <span class="badge">Mesa ${escapeHtml(match.tableNo || '—')}</span>
              <span class="helper" style="margin-left:8px;">${escapeHtml(match.phaseLabel || 'Partido')}</span>
            </div>
            ${renderStatusPill(match.status)}
          </div>

          <div style="margin-top:12px;">
            <div style="font-size:18px; font-weight:bold;">
              ${escapeHtml(match.matchupLabel || `${match.leftLabel || '—'} vs ${match.rightLabel || '—'}`)}
            </div>
            ${match.refereeLabel ? `<div class="helper">${escapeHtml(match.refereeLabel)}</div>` : ''}
          </div>
        </article>
      `;
    }).join('');

    root.innerHTML = `<div class="match-list">${html}</div>`;
    enhancePublicMatchups(root, vm.matches);
  }

  function enhancePublicMatchups(root, matches) {
    const items = root ? root.querySelectorAll('.match-item') : [];
    if (!items || !items.length) return;

    items.forEach(function (article, index) {
      const match = matches && matches[index];
      if (!match) return;

      const detailBlock = article.children[1];
      const legacyMatchup = detailBlock ? detailBlock.firstElementChild : null;
      if (!legacyMatchup) return;

      legacyMatchup.outerHTML = renderResponsiveMatchup(match);
    });
  }

  function renderResponsiveMatchup(match) {
    const leftLabel = String(match && match.leftLabel || '').trim();
    const rightLabel = String(match && match.rightLabel || '').trim();
    const matchupLabel = String(match && match.matchupLabel || '').trim();
    const fallbackLabel = matchupLabel || `${leftLabel || '-'} vs ${rightLabel || '-'}`;
    const isStructuredMatchup = !!leftLabel &&
      !!rightLabel &&
      leftLabel !== 'BYE' &&
      rightLabel !== 'BYE' &&
      matchupLabel.indexOf('Pasan a la siguiente ronda') === -1;

    if (!isStructuredMatchup) {
      return `
        <div class="matchup-display matchup-display--solo">
          ${escapeHtml(fallbackLabel)}
        </div>
      `;
    }

    return `
      <div class="matchup-display matchup-display--emphasis">
        <span class="matchup-display__side">${escapeHtml(leftLabel)}</span>
        <span class="matchup-display__anchor">vs</span>
        <span class="matchup-display__side">${escapeHtml(rightLabel)}</span>
      </div>
    `;
  }

  function renderStatusPill(status) {
    const value = String(status || '');
    let cls = 'status-closed';

    if (value === 'En juego') cls = 'status-live';
    else if (value === 'Programado') cls = 'status-pending';
    else if (value === 'Pendiente') cls = 'status-pending';
    else if (value === 'Resultado ingresado') cls = 'status-done';
    else if (value === 'Cierre en curso') cls = 'status-live';

    return `<span class="status-pill ${cls}">${escapeHtml(value || '-')}</span>`;
  }

  function buildPublicVmForClientTime_(vm) {
    const baseVm = vm || {};
    const projectedClock = getProjectedClockSnapshot_();
    const currentBlock = baseVm.currentBlock ? Object.assign({}, baseVm.currentBlock) : null;
    const matches = Array.isArray(baseVm.matches) ? baseVm.matches.map(function (match) {
      return Object.assign({}, match);
    }) : [];

    if (!projectedClock || !currentBlock) {
      return Object.assign({}, baseVm, {
        currentBlock: currentBlock,
        matches: matches,
      });
    }

    const expectedBlockStatus = getExpectedBlockStatus(currentBlock, projectedClock.internalNowMs);
    const currentBlockId = String(currentBlock.id || '').trim();
    const mergedBlockStatus = mergeMonotonicBlockStatus_(currentBlockId, expectedBlockStatus || currentBlock.status || '');
    currentBlock.status = mergedBlockStatus;

    matches.forEach(function (match) {
      match.status = derivePublicMatchStatus_(match, currentBlock, projectedClock.internalNowMs);
    });

    return Object.assign({}, baseVm, {
      currentBlock: currentBlock,
      matches: matches,
      clock: Object.assign({}, baseVm.clock || {}, {
        internalNowTs: formatClockStamp(projectedClock.internalNowMs),
        realNowTs: formatClockStamp(projectedClock.realNowMs),
      }),
    });
  }

  function derivePublicMatchStatus_(match, currentBlock, internalNowMs) {
    const currentStatus = String(match && match.status || '').trim();
    const expectedBlockStatus = String(currentBlock && currentBlock.status || getExpectedBlockStatus(currentBlock, internalNowMs) || '').trim();

    if (!expectedBlockStatus) return currentStatus;
    if (currentStatus === 'Resultado ingresado' || currentStatus === 'Cerrado') return currentStatus;
    if (expectedBlockStatus === 'scheduled') return 'Programado';
    if (expectedBlockStatus === 'live') return 'En juego';
    if (expectedBlockStatus === 'closing') return 'Cierre en curso';
    if (expectedBlockStatus === 'transition' || expectedBlockStatus === 'closed') return 'Cerrado/Terminado';

    return currentStatus;
  }

  function mergeMonotonicBlockStatus_(blockId, nextStatus) {
    const normalizedBlockId = String(blockId || '').trim();
    const normalizedNextStatus = String(nextStatus || '').trim();
    if (!normalizedBlockId) {
      publicLastDerivedBlockId = '';
      publicLastDerivedBlockStatus = '';
      return normalizedNextStatus;
    }

    if (publicLastDerivedBlockId !== normalizedBlockId) {
      publicLastDerivedBlockId = normalizedBlockId;
      publicLastDerivedBlockStatus = normalizedNextStatus;
      return normalizedNextStatus;
    }

    const merged = getMoreAdvancedBlockStatus_(publicLastDerivedBlockStatus, normalizedNextStatus);
    publicLastDerivedBlockStatus = merged;
    return merged;
  }

  function getMoreAdvancedBlockStatus_(leftStatus, rightStatus) {
    const rank = {
      scheduled: 1,
      live: 2,
      closing: 3,
      transition: 4,
      closed: 5,
    };

    const left = String(leftStatus || '').trim();
    const right = String(rightStatus || '').trim();
    const leftRank = Object.prototype.hasOwnProperty.call(rank, left) ? rank[left] : 0;
    const rightRank = Object.prototype.hasOwnProperty.call(rank, right) ? rank[right] : 0;

    return leftRank >= rightRank ? left : right;
  }

  function toggleControlHeartbeatMode() {
    controlHeartbeatEnabled = !controlHeartbeatEnabled;
    saveControlHeartbeatEnabled_(controlHeartbeatEnabled);

    if (controlHeartbeatEnabled) {
      updateControlHeartbeatUi();
      startControlHeartbeatLoopIfNeeded_();
      runControlHeartbeatCycle_();
      return;
    }

    stopControlHeartbeatLoop_();
    releaseControlHeartbeatLease_();
    releaseControlHeartbeatWakeLock_();
    controlHeartbeatLeadership = false;
    controlHeartbeatLeaseInfo = null;
    updateControlHeartbeatUi();
  }

  function startControlHeartbeatLoopIfNeeded_() {
    if (!controlHeartbeatEnabled || !isAdminScreenActive_() || document.visibilityState !== 'visible') {
      return;
    }

    const intervalMs = getControlHeartbeatIntervalSeconds_() * 1000;
    const currentInterval = controlHeartbeatTimer && controlHeartbeatTimer.__intervalMs ? controlHeartbeatTimer.__intervalMs : 0;
    if (controlHeartbeatTimer && currentInterval === intervalMs) {
      return;
    }

    stopControlHeartbeatLoop_();
    controlHeartbeatTimer = window.setInterval(runControlHeartbeatCycle_, intervalMs);
    controlHeartbeatTimer.__intervalMs = intervalMs;
    requestControlHeartbeatWakeLock_();
    updateControlHeartbeatUi();
  }

  function stopControlHeartbeatLoop_() {
    if (controlHeartbeatTimer) {
      window.clearInterval(controlHeartbeatTimer);
      controlHeartbeatTimer = null;
    }
  }

  function runControlHeartbeatCycle_() {
    if (!controlHeartbeatEnabled || !isAdminScreenActive_() || document.visibilityState !== 'visible' || controlHeartbeatInFlight) {
      updateControlHeartbeatUi();
      return;
    }

    if (!db) {
      controlHeartbeatLeadership = false;
      controlHeartbeatLeaseInfo = {
        status: 'error',
        detail: 'Firebase no esta disponible para coordinar el dispositivo lider.',
      };
      updateControlHeartbeatUi();
      return;
    }

    controlHeartbeatInFlight = true;
    claimOrRenewControlHeartbeatLease_()
      .then(function (leaseResult) {
        controlHeartbeatLeadership = !!(leaseResult && leaseResult.isLeader);
        controlHeartbeatLeaseInfo = leaseResult || null;
        updateControlHeartbeatUi();

        if (!controlHeartbeatLeadership) {
          releaseControlHeartbeatWakeLock_();
          return null;
        }

        requestControlHeartbeatWakeLock_();
        return runControlHeartbeatServerTick_();
      })
      .catch(function (error) {
        controlHeartbeatLeadership = false;
        controlHeartbeatLeaseInfo = {
          status: 'error',
          detail: error && error.message ? error.message : String(error || 'Error desconocido'),
        };
        updateControlHeartbeatUi();
        releaseControlHeartbeatWakeLock_();
      })
      .finally(function () {
        controlHeartbeatInFlight = false;
      });
  }

  function runControlHeartbeatServerTick_() {
    return new Promise(function (resolve, reject) {
      google.script.run
        .withSuccessHandler(function (result) {
          if (result && result.clock) {
            updateAppHeaderClockSnapshot(result.clock);
          }
          if (result && result.tickResult && result.tickResult.currentBlockStatus) {
            controlHeartbeatLeaseInfo = Object.assign({}, controlHeartbeatLeaseInfo || {}, {
              status: 'active',
              detail: `Heartbeat activo. Motor en ${result.tickResult.currentBlockStatus || 'sin bloque'} a las ${String(result.generatedAt || '').trim() || 'ahora'}.`,
            });
            updateControlHeartbeatUi();
          }
          resolve(result || null);
        })
        .withFailureHandler(function (error) {
          reject(error);
        })
        .runControlHeartbeatFromUi();
    });
  }

  function claimOrRenewControlHeartbeatLease_() {
    return new Promise(function (resolve, reject) {
      if (!db) {
        reject(new Error('Firebase no esta disponible.'));
        return;
      }

      if (!controlHeartbeatLeaseRef) {
        controlHeartbeatLeaseRef = db.ref('system/controlHeartbeatLease');
      }

      const nowMs = Date.now();
      const expiresAt = nowMs + CONTROL_HEARTBEAT_LEASE_MS;
      const payload = {
        ownerId: controlHeartbeatClientId,
        ownerLabel: buildControlHeartbeatOwnerLabel_(),
        intervalSeconds: getControlHeartbeatIntervalSeconds_(),
        updatedAt: nowMs,
        expiresAt: expiresAt,
      };

      controlHeartbeatLeaseRef.transaction(function (current) {
        const currentOwnerId = current && current.ownerId ? String(current.ownerId) : '';
        const currentExpiresAt = current && current.expiresAt ? Number(current.expiresAt) : 0;
        if (currentOwnerId && currentOwnerId !== controlHeartbeatClientId && currentExpiresAt > nowMs) {
          return;
        }
        return payload;
      }, function (error, committed, snapshot) {
        if (error) {
          reject(error);
          return;
        }

        const value = snapshot && typeof snapshot.val === 'function' ? snapshot.val() : null;
        const ownerId = value && value.ownerId ? String(value.ownerId) : '';
        const isLeader = ownerId === controlHeartbeatClientId;
        const detail = isLeader
          ? `Lider activo cada ${getControlHeartbeatIntervalSeconds_()} s.`
          : value && value.ownerLabel
            ? `Otro dispositivo liderando: ${value.ownerLabel}.`
            : 'Otro dispositivo esta liderando el heartbeat.';

        resolve({
          isLeader: isLeader,
          committed: !!committed,
          value: value,
          status: isLeader ? 'active' : 'waiting',
          detail: detail,
        });
      }, false);
    });
  }

  function releaseControlHeartbeatLease_() {
    if (!db) return;
    const ref = controlHeartbeatLeaseRef || db.ref('system/controlHeartbeatLease');
    ref.transaction(function (current) {
      const currentOwnerId = current && current.ownerId ? String(current.ownerId) : '';
      if (!currentOwnerId || currentOwnerId !== controlHeartbeatClientId) {
        return;
      }
      return null;
    }, function () {}, false);
  }

  async function requestControlHeartbeatWakeLock_() {
    if (!controlHeartbeatEnabled || !controlHeartbeatLeadership || !isAdminScreenActive_() || document.visibilityState !== 'visible') {
      return;
    }

    if (!('wakeLock' in navigator) || !navigator.wakeLock || typeof navigator.wakeLock.request !== 'function') {
      return;
    }

    if (controlHeartbeatWakeLock) {
      return;
    }

    try {
      controlHeartbeatWakeLock = await navigator.wakeLock.request('screen');
      if (controlHeartbeatWakeLock && typeof controlHeartbeatWakeLock.addEventListener === 'function') {
        controlHeartbeatWakeLock.addEventListener('release', function () {
          controlHeartbeatWakeLock = null;
          updateControlHeartbeatUi();
        });
      }
      updateControlHeartbeatUi();
    } catch (error) {
      controlHeartbeatLeaseInfo = Object.assign({}, controlHeartbeatLeaseInfo || {}, {
        status: 'waiting',
        detail: `Heartbeat lider activo, pero no fue posible mantener la pantalla despierta: ${error && error.message ? error.message : String(error)}`,
      });
      updateControlHeartbeatUi();
    }
  }

  function releaseControlHeartbeatWakeLock_() {
    if (!controlHeartbeatWakeLock) return;
    const wakeLock = controlHeartbeatWakeLock;
    controlHeartbeatWakeLock = null;
    if (typeof wakeLock.release === 'function') {
      wakeLock.release().catch(function () {
        // ignore release errors
      });
    }
    updateControlHeartbeatUi();
  }

  function updateControlHeartbeatUi() {
    const toggleButton = document.getElementById('control-heartbeat-toggle-button');
    const intervalInput = document.getElementById('control-heartbeat-interval-input');
    const statusEl = document.getElementById('control-heartbeat-status');
    const detailEl = document.getElementById('control-heartbeat-detail');
    const ledEl = document.getElementById('control-heartbeat-led');
    if (!toggleButton || !intervalInput || !statusEl || !detailEl || !ledEl) return;

    intervalInput.value = String(getControlHeartbeatIntervalSeconds_());
    toggleButton.textContent = controlHeartbeatEnabled ? 'Desactivar modo control' : 'Activar modo control';

    let status = 'off';
    let detail = 'Desactivado. Activalo en este dispositivo para liderar el tick fino del torneo.';

    if (controlHeartbeatEnabled && !isAdminScreenActive_()) {
      status = 'waiting';
      detail = 'Modo preparado. Abre la pantalla de Control para liderar el heartbeat.';
    } else if (controlHeartbeatEnabled && document.visibilityState !== 'visible') {
      status = 'waiting';
      detail = 'Modo preparado. Vuelve a la pestaña visible para retomar liderazgo y wake lock.';
    } else if (controlHeartbeatEnabled && controlHeartbeatLeadership) {
      status = 'active';
      detail = controlHeartbeatLeaseInfo && controlHeartbeatLeaseInfo.detail
        ? controlHeartbeatLeaseInfo.detail
        : `Lider activo cada ${getControlHeartbeatIntervalSeconds_()} s.`;
      if (controlHeartbeatWakeLock) {
        detail += ' Pantalla despierta.';
      } else {
        detail += ' Pantalla despierta no garantizada.';
      }
    } else if (controlHeartbeatEnabled && controlHeartbeatLeaseInfo && controlHeartbeatLeaseInfo.status === 'error') {
      status = 'error';
      detail = controlHeartbeatLeaseInfo.detail || 'No se pudo ejecutar el heartbeat de control.';
    } else if (controlHeartbeatEnabled) {
      status = 'waiting';
      detail = controlHeartbeatLeaseInfo && controlHeartbeatLeaseInfo.detail
        ? controlHeartbeatLeaseInfo.detail
        : 'Buscando liderazgo para ejecutar el heartbeat.';
    }

    detailEl.textContent = detail;
    statusEl.textContent = mapControlHeartbeatStatusLabel_(status);
    ledEl.className = `control-heartbeat-led${status === 'active' ? ' is-active' : ''}${status === 'waiting' ? ' is-waiting' : ''}${status === 'error' ? ' is-error' : ''}`;
  }

    if (status === 'active') return 'Heartbeat lider activo';

    return 'Heartbeat inactivo';

  function getControlHeartbeatIntervalSeconds_() {
    const input = document.getElementById('control-heartbeat-interval-input');
    const inputValue = input ? Number(input.value || '') : NaN;
    const storedValue = getStoredControlHeartbeatIntervalSeconds_();
    const resolved = Number.isFinite(inputValue) ? inputValue : storedValue;
    const normalized = Math.min(CONTROL_HEARTBEAT_MAX_SECONDS, Math.max(CONTROL_HEARTBEAT_MIN_SECONDS, Number(resolved || CONTROL_HEARTBEAT_DEFAULT_SECONDS)));

  function updateMyDayClockHud(forceRefreshCheck) {
    const clockValueEl = document.getElementById('myday-clock-now');
    const syncEl = document.getElementById('myday-clock-sync');
    const nextLabelEl = document.getElementById('myday-clock-next-label');
    const nextValueEl = document.getElementById('myday-clock-next-value');
    const expectedStatusEl = document.getElementById('myday-clock-expected-status');
    const statusPillEl = document.getElementById('myday-clock-status-pill');

    if (!clockValueEl || !syncEl || !nextLabelEl || !nextValueEl || !expectedStatusEl || !statusPillEl) {
      return;
    }

    const vm = currentMyDayVm;
    const snapshot = myDayClockSnapshot;
    const clock = vm && vm.clock ? vm.clock : null;
    const clockHealth = String(clock && clock.clockHealth || snapshot && snapshot.health || 'ok');
    const clockHealthMessage = String(clock && clock.clockHealthMessage || snapshot && snapshot.healthMessage || '');

    if (!vm || !snapshot || (!snapshot.internalNowMs && clockHealth !== 'missing_start_ts')) {
      clockValueEl.textContent = '--:--:--';
      syncEl.textContent = 'Selecciona un jugador para ver su reloj interno.';
      nextLabelEl.textContent = 'Proximo hito';
      nextValueEl.textContent = '-';
      expectedStatusEl.textContent = '-';
      statusPillEl.textContent = 'Sin snapshot';
      statusPillEl.className = 'status-pill status-pending';
      return;
    }

    if (clockHealth === 'missing_start_ts' || clockHealth === 'invalid_anchor') {
      clockValueEl.textContent = '--:--:--';
      nextLabelEl.textContent = 'Proximo hito';
      nextValueEl.textContent = 'Configura inicio';
      expectedStatusEl.textContent = 'Sin referencia';

      const syncParts = [];
      if (snapshot.realNowMs) {
        syncParts.push(`hora real ${formatClockStamp(snapshot.realNowMs)}`);
      }
      if (myDayLastSuccessAt) {
        syncParts.push(`actualizado hace ${formatRelativeSeconds(Date.now() - myDayLastSuccessAt.getTime())}`);
      }
      if (clockHealthMessage) {
        syncParts.push(clockHealthMessage);
      }
      if (myDayLastErrorMessage) {
        syncParts.push(`error: ${myDayLastErrorMessage}`);
      }

      syncEl.textContent = syncParts.join(' | ') || 'Falta configurar tournament_start_ts.';
      statusPillEl.textContent = 'Config invalida';
      statusPillEl.className = 'status-pill status-closed';
      return;
    }

    const internalNowMs = snapshot.internalNowMs;
    const tournamentStartMs = parseCanonicalDateTime(vm.clock && vm.clock.tournamentStartTs);
    const realNowMs = snapshot.realNowMs || Date.now();
    const currentBlock = vm.currentBlock || null;
    const beforeTournamentStart = !!tournamentStartMs && internalNowMs < tournamentStartMs;
    const expectedStatus = getExpectedBlockStatus(currentBlock, internalNowMs);
    const nextMilestone = getNextBlockMilestone(currentBlock, internalNowMs);
    const snapshotStatus = currentBlock ? String(currentBlock.status || '').trim() : '';
    const drifted = !!currentBlock && expectedStatus && snapshotStatus && expectedStatus !== snapshotStatus;
    const lastRunAt = parseCanonicalDateTime(clock && clock.triggerLastRunAt);

    if (clockHealth === 'missing_start_ts') {
      clockValueEl.textContent = '--:--:--';
    } else {
      clockValueEl.textContent = tournamentStartMs
        ? beforeTournamentStart
          ? formatCountdown(tournamentStartMs - internalNowMs)
          : formatElapsedClock(internalNowMs - tournamentStartMs)
        : '--:--:--';
    }
    nextLabelEl.textContent = nextMilestone.label;
    nextValueEl.textContent = nextMilestone.value;
    expectedStatusEl.textContent = expectedStatus ? formatTournamentStateLabel({ status: expectedStatus }) : 'Sin bloque';

    if (clockHealth === 'missing_start_ts') {
      statusPillEl.textContent = 'Config invalida';
      statusPillEl.className = 'status-pill status-closed';
    } else if (clockHealth === 'autocorrected') {
      statusPillEl.textContent = 'Autocorregido';
      statusPillEl.className = 'status-pill status-pending';
    } else if (beforeTournamentStart) {
      statusPillEl.textContent = 'Aun no inicia';
      statusPillEl.className = 'status-pill status-pending';
    } else if (!snapshot.isRunning) {
      statusPillEl.textContent = 'Pausado';
      statusPillEl.className = 'status-pill status-closed';
    } else if (drifted) {
      statusPillEl.textContent = 'Esperando refresh';
      statusPillEl.className = 'status-pill status-pending';
    } else {
      statusPillEl.textContent = expectedStatus ? 'Sincronizado' : 'Sin bloque';
      statusPillEl.className = expectedStatus ? 'status-pill status-done' : 'status-pill status-closed';
    }

    const syncParts = [];
    if (internalNowMs) {
      syncParts.push(`hora interna ${formatClockStamp(internalNowMs)}`);
    }
    if (realNowMs) {
      syncParts.push(`hora real ${formatClockStamp(realNowMs)}`);
    }
    if (tournamentStartMs) {
      syncParts.push(`inicio torneo ${formatClockStamp(tournamentStartMs)}`);
    }
    if (myDayLastSuccessAt) {
      syncParts.push(`actualizado hace ${formatRelativeSeconds(Date.now() - myDayLastSuccessAt.getTime())}`);
    }
    if (lastRunAt) {
      syncParts.push(`ultimo tick ${formatClockTime(lastRunAt)}`);
    }
    if (!snapshot.isRunning) {
      syncParts.push('reloj pausado');
    }
    if (clockHealthMessage) {
      syncParts.push(clockHealthMessage);
    }
    if (myDayLastErrorMessage) {
      syncParts.push(`error: ${myDayLastErrorMessage}`);
    } else if (drifted) {
      syncParts.push('El reloj interno ya cruzo un hito; refrescando snapshot...');
    }

    syncEl.textContent = syncParts.join(' · ');

    if (currentBlock && (forceRefreshCheck || expectedStatus !== snapshot.lastExpectedStatus)) {
      snapshot.lastExpectedStatus = expectedStatus;
    }
  }

  function handleTouchCardKeydown(event) {
    if (!event) return;
    const key = String(event.key || '');
    if (key !== 'Enter' && key !== ' ') return;

    event.preventDefault();
    openMatchCapture();
  }

  function renderMyDayDoublesEntryCard() {
    const root = document.getElementById('myday-doubles-entry-card');
    if (!root) return;

    const state = buildMyDayDoublesEntryState();
    const attrs = state.disabled
      ? ''
      : ' role="button" tabindex="0" onclick="openDoublesCheckInScreen()" onkeydown="handleScreenEntryCardKeydown(event, \'doubles\')"';
    const className = state.disabled
      ? 'card-soft touch-card touch-card--disabled'
      : 'card-soft touch-card touch-card--interactive';

    root.innerHTML = `
      <div class="${className}"${attrs}>
        <div class="row-between" style="align-items: flex-start;">
          <div>
            <div class="stat-label">Subpantalla</div>
            <div class="stat-value" style="font-size: 20px; margin-top: 8px;">Check-in en dobles</div>
            <div class="helper" style="margin-top: 6px;">${escapeHtml(state.detail)}</div>
          </div>
          <span class="status-pill ${state.badgeClass}">${escapeHtml(state.badgeLabel)}</span>
        </div>

        <div class="touch-card__cta ${state.disabled ? 'touch-card__cta--disabled' : 'touch-card__cta--active'}" style="margin-top: 14px;">
          <div class="touch-card__cta-label">${escapeHtml(state.ctaLabel)}</div>
          ${state.helperText ? `<div class="helper" style="margin-top: 8px;">${escapeHtml(state.helperText)}</div>` : ''}
        </div>
      </div>
    `;
  }

  function buildMyDayDoublesEntryState() {
    const playerId = getSavedPlayerId();
    const hasPlayer = !!playerId;
    const vm = currentDoublesVm || {};
    const actor = vm.actor && String(vm.actor.id || '') === playerId ? vm.actor : null;
    const myDayPlayer = currentMyDayVm && currentMyDayVm.player && String(currentMyDayVm.player.id || '') === playerId
      ? currentMyDayVm.player
      : null;
    const status = String(vm.tournamentStatus || '').trim();

    let badgeLabel = 'Listo';
    let badgeClass = 'status-done';

    if (status === 'awaiting_doubles_confirmation') {
      badgeLabel = 'Abierto';
      badgeClass = 'status-live';
    } else if (status) {
      badgeLabel = 'Cerrado';
      badgeClass = 'status-closed';
    }

    if (!hasPlayer) {
      return {
        disabled: true,
        badgeLabel: badgeLabel,
        badgeClass: badgeClass,
        detail: 'Usa el selector de Mi jornada para cargar tu estado personal antes de entrar.',
        ctaLabel: 'Selecciona tu nombre en Mi jornada',
        helperText: 'El check-in de dobles hereda automaticamente el jugador que elijas arriba.',
      };
    }

    if (doublesIsLoading) {
      return {
        disabled: true,
        badgeLabel: 'Cargando',
        badgeClass: 'status-pending',
        detail: `${myDayPlayer && (myDayPlayer.fullName || myDayPlayer.name) || 'Jugador seleccionado'} · Sincronizando estado de dobles...`,
        ctaLabel: 'Actualizando check-in',
        helperText: 'Espera un momento antes de entrar para evitar ver informacion anterior.',
      };
    }

    return {
      disabled: false,
      badgeLabel: badgeLabel,
      badgeClass: badgeClass,
      detail: actor
        ? `${actor.name} · ${buildDoublesActorDetail(actor)}`
        : `${myDayPlayer && (myDayPlayer.fullName || myDayPlayer.name) || 'Jugador seleccionado'} · Cargando estado de dobles...`,
      ctaLabel: 'Abrir check-in de dobles',
      helperText: status === 'awaiting_doubles_confirmation'
        ? 'La ventana esta activa para confirmar partner, entrar al pool o declinar.'
        : 'La pantalla conserva el contexto del jugador seleccionado.',
    };
  }

  function openDoublesCheckInScreen() {
    if (!getSavedPlayerId()) return;
    setActiveAppScreen('doubles');
  }

  function handleScreenEntryCardKeydown(event, screen) {
    if (!event) return;
    const key = String(event.key || '');
    if (key !== 'Enter' && key !== ' ') return;

    event.preventDefault();
    if (screen === 'doubles') openDoublesCheckInScreen();
    if (screen === 'groups') setActiveAppScreen('groups');
  }

  function renderMyDayTimeline(items) {
    if (!items || items.length === 0) return '';

    const cardsHtml = items.map(function (item) {
      const toneClass = getMyDayTimelineToneClass(item.tone);

      return `
        <div class="card-soft" style="border-left: 4px solid ${toneClass};">
          <div class="stat-label">${escapeHtml(item.title || '')}</div>
          <div class="stat-value" style="font-size: 17px; margin-top: 8px;">${escapeHtml(item.primary || '')}</div>
          ${item.secondary ? `<div class="helper" style="margin-top: 6px;">${escapeHtml(item.secondary)}</div>` : ''}
        </div>
      `;
    }).join('');

    return `
      <div class="stack">
        <div class="card-soft">
          <div class="stat-label">Itinerario</div>
          <div class="helper" style="margin-top: 6px;">Próximos bloques, checkpoints y fases esperadas.</div>
        </div>
        ${cardsHtml}
      </div>
    `;
  }

  function getMyDayTimelineToneClass(tone) {
    if (tone === 'play') return '#0f766e';
    if (tone === 'referee') return '#2563eb';
    if (tone === 'checkpoint') return '#7c3aed';
    return '#94a3b8';
  }

  function getMyDayPlayerRoleUi(vm) {
    const hasCurrentMatch = !!vm.currentMatch;
    const isReferee = hasCurrentMatch && !!vm.currentMatch.isReferee;
    const isPlaying = hasCurrentMatch && (!!vm.currentMatch.isPlayerA || !!vm.currentMatch.isPlayerB);

    if (isReferee || isPlaying) {
      return { show: false, label: '', className: '' };
    }

    return {
      show: true,
      label: 'Sin turno',
      className: 'status-closed',
    };
  }

  function getMyDayMatchRoleUi(vm) {
    const hasCurrentMatch = !!vm.currentMatch;
    if (!hasCurrentMatch) {
      return { show: false, label: '', className: '' };
    }

    if (vm.currentMatch.isByeAdvance) {
      return {
        show: true,
        label: 'Libre por bye',
        className: 'status-closed',
      };
    }

    const isFinished = isMyDayMatchFinished(vm.currentMatch);

    if (isFinished) {
      return {
        show: true,
        label: 'Finalizado',
        className: 'status-done',
      };
    }

    if (vm.currentMatch.isReferee) {
      return {
        show: true,
        label: 'Eres árbitro en este partido',
        className: 'status-live',
      };
    }

    if (vm.currentMatch.isPlayerA || vm.currentMatch.isPlayerB) {
      return {
        show: true,
        label: 'Juega ahora',
        className: 'status-live',
      };
    }

    return { show: false, label: '', className: '' };
  }

  function isMyDayMatchFinished(match) {
    const status = String(match.matchStatus || '').trim();
    const resultMode = String(match.resultMode || '').trim();

    return (
      status === 'result_submitted' &&
      resultMode === 'final'
    ) || status === 'auto_closed';
  }

  function buildMyDayCommitmentLabel(vm) {
    if (!vm.currentBlock) {
      return {
        title: 'Sin bloque activo',
        detail: 'No hay actividad programada en este momento.',
      };
    }

    if (vm.currentMatch && vm.currentMatch.isByeAdvance) {
      return {
        title: 'Pareja libre en este bloque',
        detail: `Avance por bye · Bloque ${vm.currentBlock.id} · ${vm.currentBlock.phaseLabel}`,
      };
    }

    if (vm.currentMatch && isMyDayMatchFinished(vm.currentMatch)) {
      return {
        title: 'Partido finalizado en este bloque',
        detail: `Bloque ${vm.currentBlock.id} · ${vm.currentBlock.phaseLabel}`,
      };
    }

    if (vm.currentMatch && vm.currentMatch.isReferee) {
      return {
        title: 'Arbitraje asignado ahora',
        detail: `Bloque ${vm.currentBlock.id} · ${vm.currentBlock.phaseLabel}`,
      };
    }

    if (vm.currentMatch && (vm.currentMatch.isPlayerA || vm.currentMatch.isPlayerB)) {
      return {
        title: 'Partido asignado ahora',
        detail: `Bloque ${vm.currentBlock.id} · ${vm.currentBlock.phaseLabel}`,
      };
    }

    return {
      title: 'Sin compromiso en este bloque',
      detail: `Bloque ${vm.currentBlock.id} · ${vm.currentBlock.phaseLabel}`,
    };
  }

  function formatTournamentStateLabel(currentBlock) {
    if (!currentBlock) return 'Sin actividad';
    const status = String(currentBlock.status || '');

    if (status === 'live') return 'En curso';
    if (status === 'scheduled') return 'Programado';
    if (status === 'closing') return 'Cierre';
    if (status === 'transition') return 'Transicion';
    if (status === 'closed') return 'Cerrado';

    return status || 'Bloque';
  }

  function getExpectedBlockStatus(currentBlock, internalNowMs) {
    if (!currentBlock) return '';

    const startMs = parseCanonicalDateTime(currentBlock.startTs);
    const closeMs = parseCanonicalDateTime(currentBlock.closeSignalTs);
    const hardMs = parseCanonicalDateTime(currentBlock.hardCloseTs);
    const endMs = parseCanonicalDateTime(currentBlock.endTs);

    if (!startMs || internalNowMs < startMs) return 'scheduled';
    if (closeMs && internalNowMs < closeMs) return 'live';
    if (hardMs && internalNowMs < hardMs) return 'closing';
    if (endMs && internalNowMs < endMs) return 'transition';
    if (endMs && internalNowMs >= endMs) return 'closed';

    return String(currentBlock.status || '').trim();
  }

  function getNextBlockMilestone(currentBlock, internalNowMs) {
    if (!currentBlock) {
      return {
        label: 'Proximo hito',
        value: 'Sin bloque activo',
      };
    }

    const milestones = [
      { key: 'start', label: 'Inicio', at: parseCanonicalDateTime(currentBlock.startTs) },
      { key: 'close', label: 'Cierre', at: parseCanonicalDateTime(currentBlock.closeSignalTs) },
      { key: 'transition', label: 'Transicion', at: parseCanonicalDateTime(currentBlock.hardCloseTs) },
      { key: 'fin', label: 'Fin de bloque', at: parseCanonicalDateTime(currentBlock.endTs) },
    ].filter(function (item) {
      return !!item.at;
    });

    for (let i = 0; i < milestones.length; i++) {
      if (internalNowMs < milestones[i].at) {
        return {
          label: milestones[i].label,
          value: formatCountdown(milestones[i].at - internalNowMs),
        };
      }
    }

    return {
      label: 'Proximo hito',
      value: 'Esperando refresh del siguiente bloque',
    };
  }

  function captureButtonClass(isSecondary) {
    return isSecondary
      ? 'capture-action capture-action-secondary'
      : 'capture-action';
  }

  function closeMatchCapture() {
    const el = document.getElementById('capture-modal-overlay');
    if (el) el.remove();
  }

  function submitMatchCaptureFinal(setsA, setsB, triggerEl) {
    submitCapturePayload({
      mode: 'final',
      setsA: setsA,
      setsB: setsB,
    }, triggerEl);
  }

  function submitMatchCaptureClosingState(closingState, triggerEl) {
    submitCapturePayload({
      mode: 'closing_state',
      closingState: closingState,
    }, triggerEl);
  }

  function submitCapturePayload(payload, triggerEl) {
    const errorBox = document.getElementById('capture-error');
    const feedbackBox = document.getElementById('capture-feedback');
    if (errorBox) {
      errorBox.style.display = 'none';
      errorBox.textContent = '';
    }
    if (feedbackBox) {
      feedbackBox.style.display = 'none';
      feedbackBox.textContent = '';
    }

    const m = currentMyDayVm.currentMatch;
    const playerId = currentMyDayVm.player.id;
    const actorRole = resolveUiActorRole(currentMyDayVm);
    setCaptureSubmittingState(true, triggerEl, payload);

    google.script.run
      .withSuccessHandler(function () {
        closeMatchCapture();
        loadMyDayFromSelect(true);
        loadPublicScreen({ silent: true });
      })
      .withFailureHandler(function (err) {
        setCaptureSubmittingState(false);
        if (!errorBox) return;
        errorBox.style.display = 'block';
        errorBox.textContent = err.message || String(err);
      })
      .submitMatchResultFromUi({
        matchId: m.matchId,
        mode: payload.mode,
        setsA: payload.setsA,
        setsB: payload.setsB,
        closingState: payload.closingState,
        actorPlayerId: playerId,
        actorRole: actorRole
      });
  }

  function setCaptureSubmittingState(isSubmitting, triggerEl, payload) {
    const buttons = document.querySelectorAll('#capture-modal-overlay .capture-action');
    const closeButton = document.querySelector('#capture-modal-overlay .capture-close');
    const feedbackBox = document.getElementById('capture-feedback');

    buttons.forEach(function (button) {
      button.disabled = isSubmitting;
      button.classList.remove('is-pressed');
    });

    if (closeButton) {
      closeButton.disabled = isSubmitting;
    }

    if (isSubmitting && triggerEl) {
      triggerEl.classList.add('is-pressed');
    }

    if (!feedbackBox) return;

    if (!isSubmitting) {
      feedbackBox.style.display = 'none';
      feedbackBox.textContent = '';
      return;
    }

    feedbackBox.style.display = 'block';
    feedbackBox.textContent = buildCaptureSubmittingLabel(payload);
  }

  function buildCaptureSubmittingLabel(payload) {
    if (!payload) return 'Enviando resultado...';
    if (payload.mode === 'final') {
      return `Enviando resultado final ${payload.setsA}-${payload.setsB}...`;
    }
    return `Enviando estado parcial ${mapClosingStateShortLabel(payload.closingState)}...`;
  }

  function mapClosingStateShortLabel(closingState) {
    if (closingState === 'A_1_0') return 'A 1-0';
    if (closingState === 'B_1_0') return 'B 1-0';
    if (closingState === 'ONE_ONE') return '1-1';
    if (closingState === 'NOT_STARTED') return 'no iniciado';
    return 'parcial';
  }

  function resolveUiActorRole(vm) {
    if (!vm || !vm.currentMatch) return 'player';
    if (vm.currentMatch.isReferee) return 'referee';
    return 'player';
  }

  function buildMyDayCta(vm) {
    if (!vm.currentMatch) {
      return {
        label: 'Sin accion disponible en este bloque',
        disabled: true,
        helperText: 'No tienes un partido o arbitraje asignado en este bloque.',
      };
    }

    if (vm.currentMatch.isByeAdvance) {
      return {
        label: 'Libre por bye',
        disabled: true,
        helperText: 'Tu pareja no juega este bloque y avanza automaticamente a la siguiente ronda.',
      };
    }

    if (isMyDayMatchFinished(vm.currentMatch)) {
      return {
        label: 'Partido ya finalizado',
        disabled: true,
        helperText: 'La captura queda cerrada porque el partido ya fue registrado.',
      };
    }

    const actions = vm.currentMatch.allowedCaptureActions || {};

    if (vm.currentMatch.isReferee && actions.canOpen) {
      return {
        label: 'Ingresar resultado',
        disabled: false,
        helperText: 'Como arbitro puedes confirmar resultado final o resultado parcial.',
      };
    }

    if ((vm.currentMatch.isPlayerA || vm.currentMatch.isPlayerB) && actions.canOpen) {
      return {
        label: 'Ingresar resultado',
        disabled: false,
        helperText: 'Como jugador puedes ingresar resultado final o un resultado parcial.',
      };
    }

    return {
      label: 'Captura no disponible',
      disabled: true,
      helperText: 'La captura se habilita solo cuando el bloque esta en juego o en cierre.',
    };
  }

  function openMatchCapture() {
    if (!currentMyDayVm || !currentMyDayVm.currentMatch) return;
    if (isMyDayMatchFinished(currentMyDayVm.currentMatch)) return;

    const m = currentMyDayVm.currentMatch;
    const actions = m.allowedCaptureActions || {};
    const isReferee = !!m.isReferee;

    if (!actions.canOpen) return;

    const modalTitle = 'Captura de resultado';
    const actionPanelsHtml = buildRefereeCapturePanel(m, isReferee);
    const actorWarning = isReferee ? '' : 'Los resultados capturados por jugadores pueden ser reemplazados por el arbitro.';

    const html = `
      <div id="capture-modal-overlay" style="
        position: fixed;
        inset: 0;
        background: rgba(15,23,42,0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: 16px;
      ">
        <div style="
          background: white;
          border-radius: 16px;
          padding: 20px;
          position: relative;
          width: 100%;
          max-width: 480px;
          max-height: 90vh;
          overflow: auto;
        ">
          <button class="capture-close" type="button" aria-label="Cerrar captura" onclick="closeMatchCapture()">
            <span aria-hidden="true">&times;</span>
          </button>

          <div style="font-weight:bold; font-size:18px; margin-bottom: 6px; padding-right: 44px;">
            ${escapeHtml(modalTitle)}
          </div>

          <div class="helper" style="margin-bottom: 12px; padding-right: 44px;">
            Mesa ${escapeHtml(m.tableNo)} · ${escapeHtml(m.phaseLabel)}
          </div>

          ${buildCaptureSidesLegend(m)}

          <div class="helper" style="display:none;">
            Mesa ${escapeHtml(m.tableNo)} · ${escapeHtml(m.phaseLabel)}
          </div>

          ${actionPanelsHtml}

          ${actorWarning ? `<div class="helper" style="margin-top: 14px;">${escapeHtml(actorWarning)}</div>` : ''}

          <div id="capture-feedback" class="helper" style="display:none; margin-top:12px; color:#0f172a;"></div>
          <div id="capture-error" class="error" style="display:none; margin-top:12px;"></div>
        </div>
      </div>
    `;

    closeMatchCapture();
    document.body.insertAdjacentHTML('beforeend', html);
  }

  function buildCaptureSidesLegend(match) {
    return `
      <div class="capture-sides-map capture-sides-map--inline" style="margin-bottom: 14px;">
        <div class="capture-side-card">
          <span class="capture-side-badge">A</span>
          <div class="capture-side-label">${escapeHtml(match.leftLabel || '-')}</div>
        </div>
        <div class="capture-side-vs">VS</div>
        <div class="capture-side-card">
          <span class="capture-side-badge">B</span>
          <div class="capture-side-label">${escapeHtml(match.rightLabel || '-')}</div>
        </div>
      </div>
    `;
  }

  function buildRefereeCapturePanel(match, isReferee) {
    return `
      <div class="card-soft" style="margin-bottom: 14px;">
        <div class="stat-label" style="margin-bottom: 10px;">Resultado final</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <button class="${captureButtonClass()}" onclick="submitMatchCaptureFinal(2,0, this)">A gana 2-0</button>
          <button class="${captureButtonClass()}" onclick="submitMatchCaptureFinal(2,1, this)">A gana 2-1</button>
          <button class="${captureButtonClass()}" onclick="submitMatchCaptureFinal(0,2, this)">B gana 0-2</button>
          <button class="${captureButtonClass()}" onclick="submitMatchCaptureFinal(1,2, this)">B gana 1-2</button>
        </div>
      </div>

      <div class="card-soft">
        <div class="stat-label" style="margin-bottom: 10px;">Resultado parcial (OPCIONAL)</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <button class="${captureButtonClass(true)}" onclick="submitMatchCaptureClosingState('A_1_0', this)">A lidera 1-0</button>
          <button class="${captureButtonClass(true)}" onclick="submitMatchCaptureClosingState('B_1_0', this)">B lidera 0-1</button>
          <button class="${captureButtonClass(true)}" onclick="submitMatchCaptureClosingState('ONE_ONE', this)">van 1-1</button>
          <button class="${captureButtonClass(true)}" onclick="submitMatchCaptureClosingState('NOT_STARTED', this)">No iniciado</button>
        </div>
      </div>
    `;
  }

  function renderMyDayError(error) {
    document.getElementById('myday-content').innerHTML =
      '<div class="error">' + escapeHtml(error.message || String(error)) + '</div>';
  }

  function parseCanonicalDateTime(value) {
    let text = String(value || '').trim();
    if (!text) return 0;
    if (text.charAt(0) === "'") {
      text = text.slice(1).trim();
    }

    const match = text.match(/^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})$/);
    if (!match) return 0;

    return new Date(
      Number(match[1]),
      Number(match[2]) - 1,
      Number(match[3]),
      Number(match[4]),
      Number(match[5]),
      Number(match[6])
    ).getTime();
  }

  function formatElapsedClock(milliseconds) {
    const safe = Math.max(0, Number(milliseconds) || 0);
    const totalSeconds = Math.floor(safe / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    return [
      String(hours).padStart(2, '0'),
      String(minutes).padStart(2, '0'),
      String(seconds).padStart(2, '0'),
    ].join(':');
  }

  function formatCountdown(milliseconds) {
    return formatElapsedClock(milliseconds);
  }

  function formatRelativeSeconds(milliseconds) {
    const seconds = Math.max(0, Math.floor((Number(milliseconds) || 0) / 1000));
    return seconds + ' s';
  }

  function formatClockTime(milliseconds) {
    if (!milliseconds) return '--:--:--';

    const date = new Date(milliseconds);
    return [
      String(date.getHours()).padStart(2, '0'),
      String(date.getMinutes()).padStart(2, '0'),
      String(date.getSeconds()).padStart(2, '0'),
    ].join(':');
  }

  function formatClockStamp(milliseconds) {
    if (!milliseconds) return '--';

    const date = new Date(milliseconds);
    const yyyy = String(date.getFullYear());
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    const dd = String(date.getDate()).padStart(2, '0');

    return `${yyyy}-${mm}-${dd} ${formatClockTime(milliseconds)}`;
  }

  function savePlayerId(playerId) {
    try {
      localStorage.setItem(LOCAL_STORAGE_PLAYER_KEY, String(playerId || ''));
    } catch (e) {
      console.warn('No se pudo guardar player_id en localStorage', e);
    }
  }

  function getSavedPlayerId() {
    try {
      return localStorage.getItem(LOCAL_STORAGE_PLAYER_KEY) || '';
    } catch (e) {
      return '';
    }
  }

  function saveGroupsPlayerId(playerId) {
    try {
      localStorage.setItem(LOCAL_STORAGE_GROUPS_PLAYER_KEY, String(playerId || ''));
    } catch (e) {
      console.warn('No se pudo guardar player_id de grupos en localStorage', e);
    }
  }

  function getSavedGroupsPlayerId() {
    try {
      return localStorage.getItem(LOCAL_STORAGE_GROUPS_PLAYER_KEY) || '';
    } catch (e) {
      return '';
    }
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>
