<script>
  const PUBLIC_REFRESH_MS = 10000;
  const LOCAL_STORAGE_PLAYER_KEY = 'ttm_selected_player_id';
  const LOCAL_STORAGE_SCREEN_KEY = 'ttm_active_screen';

  let publicRefreshTimer = null;
  let publicLoadInFlight = false;
  let publicLastSuccessAt = null;
  let currentMyDayVm = null;
  let currentAdminVm = null;
  let adminActionInFlight = false;

  document.addEventListener('DOMContentLoaded', function () {
    initializeAppScreens();
    loadPublicScreen();
    startPublicAutoRefresh();
    loadPlayerSelector();
    loadAdminControl();
  });

  function initializeAppScreens() {
    const savedScreen = getSavedAppScreen();
    setActiveAppScreen(savedScreen || 'public');
  }

  function getSavedAppScreen() {
    try {
      return window.localStorage.getItem(LOCAL_STORAGE_SCREEN_KEY) || 'public';
    } catch (error) {
      return 'public';
    }
  }

  function saveAppScreen(screen) {
    try {
      window.localStorage.setItem(LOCAL_STORAGE_SCREEN_KEY, screen);
    } catch (error) {
      // ignore storage failures
    }
  }

  function setActiveAppScreen(screen) {
    const nextScreen = String(screen || 'public').trim() || 'public';
    const tabs = document.querySelectorAll('[data-screen-tab]');
    const panels = document.querySelectorAll('[data-screen-panel]');

    tabs.forEach(function (tab) {
      const isActive = tab.getAttribute('data-screen-tab') === nextScreen;
      tab.classList.toggle('is-active', isActive);
      tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });

    panels.forEach(function (panel) {
      const isActive = panel.getAttribute('data-screen-panel') === nextScreen;
      panel.classList.toggle('is-active', isActive);
      panel.hidden = !isActive;
    });

    saveAppScreen(nextScreen);
    window.scrollTo({ top: 0, behavior: 'auto' });
  }

  function startPublicAutoRefresh() {
    stopPublicAutoRefresh();

    publicRefreshTimer = window.setInterval(function () {
      loadPublicScreen({ silent: true });
    }, PUBLIC_REFRESH_MS);

    setRefreshIndicator('Actualización automática activada');
  }

  function stopPublicAutoRefresh() {
    if (publicRefreshTimer) {
      window.clearInterval(publicRefreshTimer);
      publicRefreshTimer = null;
    }
  }

  function loadPublicScreen(options) {
    const opts = options || {};
    const silent = !!opts.silent;

    if (publicLoadInFlight) return;

    publicLoadInFlight = true;
    setRefreshIndicator(silent ? 'Actualizando...' : 'Cargando datos...');

    google.script.run
      .withSuccessHandler(function (vm) {
        publicLoadInFlight = false;
        publicLastSuccessAt = new Date();
        renderPublicScreen(vm);
        setRefreshIndicator(buildRefreshIndicatorText());
      })
      .withFailureHandler(function (error) {
        publicLoadInFlight = false;
        renderPublicScreenError(error);
        setRefreshIndicator('Error al actualizar');
      })
      .getPublicViewModel();
  }

  function renderPublicScreen(vm) {
    renderTopStats(vm);
    renderPublicMatches(vm);
  }

  function renderTopStats(vm) {
    document.getElementById('stat-status').textContent = vm.tournamentStatus || '—';
    document.getElementById('stat-block').textContent = vm.currentBlock ? vm.currentBlock.id : '—';
    document.getElementById('stat-phase').textContent = vm.currentBlock ? vm.currentBlock.phaseLabel : '—';
    document.getElementById('stat-updated').textContent = vm.generatedAt || '—';
  }

  function renderPublicMatches(vm) {
    const root = document.getElementById('public-screen-content');

    if (!vm.currentBlock) {
      root.innerHTML = '<div class="empty">No hay bloque activo en este momento.</div>';
      return;
    }

    if (!vm.matches || vm.matches.length === 0) {
      root.innerHTML = '<div class="empty">El bloque actual no tiene partidos visibles.</div>';
      return;
    }

    const html = vm.matches.map(function (match) {
      return `
        <article class="match-item">
          <div class="row-between">
            <div>
              <span class="badge">Mesa ${escapeHtml(match.tableNo || '—')}</span>
              <span class="helper" style="margin-left:8px;">${escapeHtml(match.phaseLabel || 'Partido')}</span>
            </div>
            ${renderStatusPill(match.status)}
          </div>

          <div style="margin-top:12px;">
            <div style="font-size:18px; font-weight:bold;">
              ${escapeHtml(match.matchupLabel || `${match.leftLabel || '—'} vs ${match.rightLabel || '—'}`)}
            </div>
            ${match.refereeLabel ? `<div class="helper">${escapeHtml(match.refereeLabel)}</div>` : ''}
          </div>
        </article>
      `;
    }).join('');

    root.innerHTML = `<div class="match-list">${html}</div>`;
    enhancePublicMatchups(root, vm.matches);
  }

  function enhancePublicMatchups(root, matches) {
    const items = root ? root.querySelectorAll('.match-item') : [];
    if (!items || !items.length) return;

    items.forEach(function (article, index) {
      const match = matches && matches[index];
      if (!match) return;

      const detailBlock = article.children[1];
      const legacyMatchup = detailBlock ? detailBlock.firstElementChild : null;
      if (!legacyMatchup) return;

      legacyMatchup.outerHTML = renderResponsiveMatchup(match);
    });
  }

  function renderResponsiveMatchup(match) {
    const leftLabel = String(match && match.leftLabel || '').trim();
    const rightLabel = String(match && match.rightLabel || '').trim();
    const matchupLabel = String(match && match.matchupLabel || '').trim();
    const fallbackLabel = matchupLabel || `${leftLabel || '-'} vs ${rightLabel || '-'}`;
    const isStructuredMatchup = !!leftLabel &&
      !!rightLabel &&
      leftLabel !== 'BYE' &&
      rightLabel !== 'BYE' &&
      matchupLabel.indexOf('Pasan a la siguiente ronda') === -1;

    if (!isStructuredMatchup) {
      return `
        <div class="matchup-display matchup-display--solo">
          ${escapeHtml(fallbackLabel)}
        </div>
      `;
    }

    return `
      <div class="matchup-display matchup-display--emphasis">
        <span class="matchup-display__side">${escapeHtml(leftLabel)}</span>
        <span class="matchup-display__anchor">vs</span>
        <span class="matchup-display__side">${escapeHtml(rightLabel)}</span>
      </div>
    `;
  }

  function renderStatusPill(status) {
    const value = String(status || '');
    let cls = 'status-closed';

    if (value === 'En juego') cls = 'status-live';
    else if (value === 'Pendiente') cls = 'status-pending';
    else if (value === 'Resultado ingresado') cls = 'status-done';

    return `<span class="status-pill ${cls}">${escapeHtml(value || '—')}</span>`;
  }

  function renderPublicScreenError(error) {
    const root = document.getElementById('public-screen-content');
    const message = error && error.message ? error.message : String(error || 'Error desconocido');
    root.innerHTML = `<div class="error">No se pudo cargar la pantalla pública: ${escapeHtml(message)}</div>`;
  }

  function setRefreshIndicator(text) {
    const el = document.getElementById('refresh-indicator');
    if (!el) return;
    el.textContent = text;
  }

  function buildRefreshIndicatorText() {
    if (!publicLastSuccessAt) {
      return 'Actualización automática activada';
    }

    const hh = String(publicLastSuccessAt.getHours()).padStart(2, '0');
    const mm = String(publicLastSuccessAt.getMinutes()).padStart(2, '0');
    const ss = String(publicLastSuccessAt.getSeconds()).padStart(2, '0');

    return `Actualización automática · última carga ${hh}:${mm}:${ss}`;
  }

  function loadPlayerSelector() {
    google.script.run
      .withSuccessHandler(renderPlayerSelector)
      .withFailureHandler(function (err) {
        console.error(err);
      })
      .getCheckedInPlayersForSelector();
  }

  function loadAdminControl() {
    const root = document.getElementById('admin-control-content');
    if (!root) return;

    root.innerHTML = '<div class="loading">Cargando panel de control...</div>';
    setAdminActionFeedback('');

    google.script.run
      .withSuccessHandler(function (vm) {
        renderAdminControl(vm);
      })
      .withFailureHandler(renderAdminControlError)
      .getAdminControlViewModel();
  }

  function renderAdminControl(vm) {
    currentAdminVm = vm;

    const root = document.getElementById('admin-control-content');
    if (!root) return;

    const startInput = document.getElementById('admin-start-ts-input');
    if (startInput && !document.activeElement.isSameNode(startInput)) {
      startInput.value = vm.tournamentStartTs || '';
    }

    updateAdminToggleClockButton(vm);
    updateAdminCheckpointButtons(vm);

    const currentBlockHtml = vm.currentBlock
      ? `
        <div class="card-soft">
          <div class="stat-label" style="margin-bottom: 10px;">Bloque actual</div>
          <div class="admin-kv">
            <div class="admin-kv-label">Bloque</div>
            <div class="admin-code">${escapeHtml(vm.currentBlock.id)} · ${escapeHtml(vm.currentBlock.phaseLabel || vm.currentBlock.phaseType)}</div>
            <div class="admin-kv-label">Estado</div>
            <div class="admin-code">${escapeHtml(vm.currentBlock.status || '-')}</div>
            <div class="admin-kv-label">Inicio</div>
            <div class="admin-code">${escapeHtml(vm.currentBlock.startTs || '-')}</div>
            <div class="admin-kv-label">Cierre suave</div>
            <div class="admin-code">${escapeHtml(vm.currentBlock.closeSignalTs || '-')}</div>
            <div class="admin-kv-label">Hard close</div>
            <div class="admin-code">${escapeHtml(vm.currentBlock.hardCloseTs || '-')}</div>
            <div class="admin-kv-label">Fin</div>
            <div class="admin-code">${escapeHtml(vm.currentBlock.endTs || '-')}</div>
            <div class="admin-kv-label">Publicado</div>
            <div class="admin-code">${escapeHtml(vm.currentBlock.publishedAt || '-')}</div>
            <div class="admin-kv-label">Cerrado</div>
            <div class="admin-code">${escapeHtml(vm.currentBlock.closedAt || '-')}</div>
          </div>
        </div>
      `
      : `
        <div class="card-soft">
          <div class="stat-label" style="margin-bottom: 10px;">Bloque actual</div>
          <div class="empty" style="padding: 14px;">No hay bloque activo.</div>
        </div>
      `;

    root.innerHTML = `
      <div class="admin-summary-grid">
        <div class="card-soft">
          <div class="stat-label" style="margin-bottom: 10px;">Estado de torneo</div>
          <div class="admin-kv">
            <div class="admin-kv-label">Tournament status</div>
            <div class="admin-code">${escapeHtml(vm.tournamentStatus || '-')}</div>
            <div class="admin-kv-label">Hora base</div>
            <div class="admin-code">${escapeHtml(vm.tournamentStartTs || '-')}</div>
            <div class="admin-kv-label">Duracion bloque</div>
            <div class="admin-code">${escapeHtml(vm.timing.totalMinutes || 0)} min (${escapeHtml(vm.timing.playMinutes || 0)} juego / ${escapeHtml(vm.timing.closeMinutes || 0)} cierre / ${escapeHtml(vm.timing.transitionMinutes || 0)} transicion)</div>
            <div class="admin-kv-label">App TZ</div>
            <div class="admin-code">${escapeHtml(vm.timeZone && vm.timeZone.appTimeZone || '-')}</div>
            <div class="admin-kv-label">Generado</div>
            <div class="admin-code">${escapeHtml(vm.generatedAt || '-')}</div>
          </div>
        </div>

        ${currentBlockHtml}

        <div class="card-soft">
          <div class="stat-label" style="margin-bottom: 10px;">Resumen de datos</div>
          <div class="admin-kv">
            <div class="admin-kv-label">Players</div>
            <div class="admin-code">${escapeHtml(vm.counts.players)}</div>
            <div class="admin-kv-label">Groups</div>
            <div class="admin-code">${escapeHtml(vm.counts.groups)}</div>
            <div class="admin-kv-label">Matches</div>
            <div class="admin-code">${escapeHtml(vm.counts.matches)}</div>
            <div class="admin-kv-label">Blocks</div>
            <div class="admin-code">${escapeHtml(vm.counts.blocks)}</div>
            <div class="admin-kv-label">Doubles teams</div>
            <div class="admin-code">${escapeHtml(vm.counts.doublesTeams)}</div>
            <div class="admin-kv-label">Scheduled matches</div>
            <div class="admin-code">${escapeHtml(vm.counts.scheduledMatches)}</div>
            <div class="admin-kv-label">Live matches</div>
            <div class="admin-code">${escapeHtml(vm.counts.liveMatches)}</div>
            <div class="admin-kv-label">Final matches</div>
            <div class="admin-code">${escapeHtml(vm.counts.finalMatches)}</div>
          </div>
        </div>

        <div class="card-soft">
          <div class="stat-label" style="margin-bottom: 10px;">Dobles y trigger</div>
          <div class="admin-kv">
            <div class="admin-kv-label">Eligible</div>
            <div class="admin-code">${escapeHtml(vm.doublesSummary.eligible || 0)}</div>
            <div class="admin-kv-label">Partner confirmed</div>
            <div class="admin-code">${escapeHtml(vm.doublesSummary.partner_confirmed || 0)}</div>
            <div class="admin-kv-label">Pool</div>
            <div class="admin-code">${escapeHtml(vm.doublesSummary.pool || 0)}</div>
            <div class="admin-kv-label">Trigger enabled</div>
            <div class="admin-code">${escapeHtml(vm.trigger.enabled ? 'TRUE' : 'FALSE')}</div>
            <div class="admin-kv-label">Trigger count</div>
            <div class="admin-code">${escapeHtml(vm.trigger.triggerCount || 0)}</div>
            <div class="admin-kv-label">Last run</div>
            <div class="admin-code">${escapeHtml(vm.trigger.lastRunAt || '-')}</div>
            <div class="admin-kv-label">Sheet / Script TZ</div>
            <div class="admin-code">${escapeHtml(vm.timeZone ? `${vm.timeZone.spreadsheetTimeZone || '-'} / ${vm.timeZone.scriptTimeZone || '-'}` : '-')}</div>
            <div class="admin-kv-label">Last error</div>
            <div class="admin-code">${escapeHtml(vm.trigger.lastError || '-')}</div>
            <div class="admin-kv-label">Confirmar grupos</div>
            <div class="admin-code">${escapeHtml(vm.checkpoints.canConfirmGroups ? 'Disponible' : 'No aplica')}</div>
            <div class="admin-kv-label">Final dobles</div>
            <div class="admin-code">${escapeHtml(vm.checkpoints.canScheduleDoublesFinal ? 'Disponible' : 'No aplica')}</div>
          </div>
        </div>
      </div>
    `;

    if (vm.lastActionMessage) {
      setAdminActionFeedback(vm.lastActionMessage);
    }
  }

  function renderAdminControlError(error) {
    const root = document.getElementById('admin-control-content');
    if (!root) return;

    const message = error && error.message ? error.message : String(error || 'Error desconocido');
    root.innerHTML = `<div class="error">No se pudo cargar el panel de control: ${escapeHtml(message)}</div>`;
  }

  function saveTournamentStartTsFromAdmin() {
    const input = document.getElementById('admin-start-ts-input');
    const value = input ? input.value : '';
    runAdminAction('Guardando hora base...', 'Hora base guardada.', function () {
      google.script.run
        .withSuccessHandler(handleAdminActionSuccess)
        .withFailureHandler(handleAdminActionError)
        .setTournamentStartTsFromUi(value);
    });
  }

  function setTournamentStartNowFromAdmin() {
    runAdminAction('Guardando hora base actual...', 'Hora base actualizada.', function () {
      google.script.run
        .withSuccessHandler(handleAdminActionSuccess)
        .withFailureHandler(handleAdminActionError)
        .setTournamentStartNowFromUi();
    });
  }

  function initializeTournamentFlowV2FromAdmin() {
    runAdminAction('Reseteando flujo V2...', 'Flujo V2 reseteado.', function () {
      google.script.run
        .withSuccessHandler(handleAdminActionSuccess)
        .withFailureHandler(handleAdminActionError)
        .initializeTournamentFlowV2FromUi();
    });
  }

  function seedDemoDoublesFromAdmin() {
    runAdminAction('Aplicando helper de dobles demo...', 'Helper de dobles demo aplicado.', function () {
      google.script.run
        .withSuccessHandler(handleAdminActionSuccess)
        .withFailureHandler(handleAdminActionError)
        .seedDemoDoublesConfigFromUi();
    });
  }

  function generateInitialDoublesFromAdmin() {
    runAdminAction('Generando bloque inicial de dobles...', '', function () {
      google.script.run
        .withSuccessHandler(handleAdminActionSuccess)
        .withFailureHandler(handleAdminActionError)
        .setupDoublesStageFromUi();
    });
  }

  function confirmSinglesGroupsFromAdmin() {
    runAdminAction('Confirmando grupos de singles...', '', function () {
      google.script.run
        .withSuccessHandler(handleAdminActionSuccess)
        .withFailureHandler(handleAdminActionError)
        .confirmSinglesGroupsFromUi();
    });
  }

  function scheduleDoublesFinalFromAdmin() {
    runAdminAction('Programando final de dobles...', '', function () {
      google.script.run
        .withSuccessHandler(handleAdminActionSuccess)
        .withFailureHandler(handleAdminActionError)
        .scheduleDoublesFinalFromUi();
    });
  }

  function runTickNowFromAdmin() {
    runAdminAction('Ejecutando tick manual...', '', function () {
      google.script.run
        .withSuccessHandler(handleAdminActionSuccess)
        .withFailureHandler(handleAdminActionError)
        .runTournamentClockNowFromUi();
    });
  }

  function toggleClockTriggerFromAdmin() {
    const enabled = currentAdminVm && currentAdminVm.trigger ? !!currentAdminVm.trigger.enabled : false;
    const nextValue = !enabled;
    runAdminAction(nextValue ? 'Reanudando reloj automatico...' : 'Pausando reloj automatico...', '', function () {
      google.script.run
        .withSuccessHandler(handleAdminActionSuccess)
        .withFailureHandler(handleAdminActionError)
        .setClockTriggerEnabledFromUi(nextValue);
    });
  }

  function startDemoTournamentNowFromAdmin() {
    runAdminAction('Iniciando simulacion ahora...', '', function () {
      google.script.run
        .withSuccessHandler(handleAdminActionSuccess)
        .withFailureHandler(handleAdminActionError)
        .startDemoTournamentNowFromUi();
    });
  }

  function runAdminAction(loadingText, fallbackSuccessText, executor) {
    if (adminActionInFlight) return;
    adminActionInFlight = true;
    setAdminButtonsDisabled(true);
    setAdminActionFeedback(loadingText || 'Procesando...');
    window.__adminFallbackSuccessText = fallbackSuccessText || '';
    executor();
  }

  function handleAdminActionSuccess(vm) {
    adminActionInFlight = false;
    setAdminButtonsDisabled(false);
    renderAdminControl(vm);
    if (!vm || !vm.lastActionMessage) {
      setAdminActionFeedback(window.__adminFallbackSuccessText || 'Operacion completada.');
    }
  }

  function handleAdminActionError(error) {
    adminActionInFlight = false;
    setAdminButtonsDisabled(false);
    const message = error && error.message ? error.message : String(error || 'Error desconocido');
    setAdminActionFeedback(message, true);
  }

  function setAdminButtonsDisabled(disabled) {
    const buttons = document.querySelectorAll('.admin-action-button');
    buttons.forEach(function (button) {
      button.disabled = disabled;
    });
  }

  function updateAdminToggleClockButton(vm) {
    const button = document.getElementById('admin-toggle-clock-button');
    if (!button) return;
    const enabled = vm && vm.trigger ? !!vm.trigger.enabled : false;
    button.textContent = enabled ? 'Pausar reloj' : 'Reanudar reloj';
  }

  function updateAdminCheckpointButtons(vm) {
    const confirmGroupsButton = document.querySelector('button[onclick="confirmSinglesGroupsFromAdmin()"]');
    if (confirmGroupsButton) {
      confirmGroupsButton.disabled = !(vm && vm.checkpoints && vm.checkpoints.canConfirmGroups);
    }

    const doublesFinalButton = document.querySelector('button[onclick="scheduleDoublesFinalFromAdmin()"]');
    if (doublesFinalButton) {
      doublesFinalButton.disabled = !(vm && vm.checkpoints && vm.checkpoints.canScheduleDoublesFinal);
    }
  }

  function setAdminActionFeedback(text, isError) {
    const el = document.getElementById('admin-action-feedback');
    if (!el) return;
    el.textContent = text || '';
    el.style.color = isError ? '#991b1b' : '';
  }

  function renderPlayerSelector(players) {
    const select = document.getElementById('my-player-select');
    if (!select) return;

    if (!players || players.length === 0) {
      select.innerHTML = '<option value="">No hay jugadores disponibles</option>';
      return;
    }

    const savedPlayerId = getSavedPlayerId();

    const options = players.map(p => {
      const selected = savedPlayerId === p.id ? ' selected' : '';
      return `<option value="${escapeHtml(p.id)}"${selected}>${escapeHtml(p.name)} · ${escapeHtml(p.id)}</option>`;
    });

    select.innerHTML =
      '<option value="">Selecciona para ver tu jornada</option>' +
      options.join('');

    if (savedPlayerId && players.some(p => p.id === savedPlayerId)) {
      loadMyDayFromSelect(true);
    }
  }

  function loadMyDayFromSelect(isAutoLoad) {
    const select = document.getElementById('my-player-select');
    const playerId = select.value;

    if (!playerId) {
      const root = document.getElementById('myday-content');
      if (root) {
        root.innerHTML = '<div class="empty">Selecciona para ver tu jornada.</div>';
      }
      return;
    }

    savePlayerId(playerId);

    const root = document.getElementById('myday-content');
    root.innerHTML = '<div class="loading">Cargando jornada...</div>';

    google.script.run
      .withSuccessHandler(renderMyDay)
      .withFailureHandler(renderMyDayError)
      .getMyDayViewModel(playerId);
  }

  function renderMyDay(vm) {
    currentMyDayVm = vm;

    const root = document.getElementById('myday-content');
    const playerRoleUi = getMyDayPlayerRoleUi(vm);
    const matchRoleUi = getMyDayMatchRoleUi(vm);
    const nextCommitment = buildMyDayCommitmentLabel(vm);
    const cta = buildMyDayCta(vm);
    const matchMeta = vm.currentMatch || null;

    let playerBadgeHtml = '';
    if (playerRoleUi.show) {
      playerBadgeHtml = `<span class="status-pill ${playerRoleUi.className}">${escapeHtml(playerRoleUi.label)}</span>`;
    }

    let matchCardHtml = `
      <div class="card-soft touch-card">
        <div class="stat-label">Compromiso del bloque</div>
        <div class="stat-value" style="font-size: 18px; margin-top: 8px;">${escapeHtml(nextCommitment.title)}</div>
        <div class="helper" style="margin-top: 6px;">${escapeHtml(nextCommitment.detail)}</div>
      </div>
    `;

    if (matchMeta) {
      let matchBadgeHtml = '';
      if (matchRoleUi.show) {
        matchBadgeHtml = `<span class="status-pill ${matchRoleUi.className}">${escapeHtml(matchRoleUi.label)}</span>`;
      }

      const isInteractiveCard = !cta.disabled;
      const matchCardAttrs = isInteractiveCard
        ? ' role="button" tabindex="0" onclick="openMatchCapture()" onkeydown="handleTouchCardKeydown(event)"'
        : '';
      const matchCardClassName = isInteractiveCard
        ? 'card-soft touch-card touch-card--interactive'
        : 'card-soft touch-card';
      const actionHintHtml = `
        <div class="touch-card__cta ${isInteractiveCard ? 'touch-card__cta--active' : 'touch-card__cta--disabled'}" style="margin-top: 14px;">
          <div class="touch-card__cta-label">${escapeHtml(cta.label)}</div>
          ${cta.helperText ? `<div class="helper" style="margin-top: 8px;">${escapeHtml(cta.helperText)}</div>` : ''}
        </div>
      `;

      matchCardHtml = `
        <div class="${matchCardClassName}"${matchCardAttrs}>
          <div class="row-between">
            <div>
              <span class="badge">Mesa ${escapeHtml(matchMeta.tableNo)}</span>
              <span class="helper" style="margin-left:8px;">${escapeHtml(matchMeta.phaseLabel)}</span>
            </div>
            ${matchBadgeHtml}
          </div>

          <div style="margin-top: 12px;">
            <div class="stat-label">Compromiso del bloque</div>
            <div class="stat-value" style="margin-top: 8px;">
              ${renderResponsiveMatchup(matchMeta)}
            </div>
            <div class="helper" style="margin-top: 6px;">${escapeHtml(nextCommitment.detail)}</div>
          </div>

          ${actionHintHtml}
        </div>
      `;
    }

    const timelineHtml = renderMyDayTimeline(vm.timeline || []);

    root.innerHTML = `
      <div class="stack">
        <div class="card-soft">
          <div class="row-between">
            <div>
              <div class="stat-label">Bloque actual</div>
              <div class="stat-value" style="font-size: 20px;">
                ${vm.currentBlock ? `Bloque ${escapeHtml(vm.currentBlock.id)}` : 'Sin bloque activo'}
              </div>
              <div class="helper" style="margin-top: 6px;">
                ${vm.currentBlock ? escapeHtml(vm.currentBlock.phaseLabel || '') : 'No hay fase en curso'}
              </div>
            </div>
            <span class="status-pill status-done">${escapeHtml(formatTournamentStateLabel(vm.currentBlock))}</span>
          </div>
        </div>

        <div class="card-soft">
          <div class="row-between">
            <div>
              <div class="stat-label">Jugador</div>
              <div class="stat-value">${escapeHtml(vm.player.fullName || vm.player.name)}</div>
              <div class="helper" style="margin-top: 6px;">${escapeHtml(vm.player.name)} · ID ${escapeHtml(vm.player.id)}</div>
            </div>
            ${playerBadgeHtml}
          </div>
        </div>

        ${matchCardHtml}

        ${timelineHtml}
      </div>
    `;
  }

  function handleTouchCardKeydown(event) {
    if (!event) return;
    const key = String(event.key || '');
    if (key !== 'Enter' && key !== ' ') return;

    event.preventDefault();
    openMatchCapture();
  }

  function renderMyDayTimeline(items) {
    if (!items || items.length === 0) return '';

    const cardsHtml = items.map(function (item) {
      const toneClass = getMyDayTimelineToneClass(item.tone);

      return `
        <div class="card-soft" style="border-left: 4px solid ${toneClass};">
          <div class="stat-label">${escapeHtml(item.title || '')}</div>
          <div class="stat-value" style="font-size: 17px; margin-top: 8px;">${escapeHtml(item.primary || '')}</div>
          ${item.secondary ? `<div class="helper" style="margin-top: 6px;">${escapeHtml(item.secondary)}</div>` : ''}
        </div>
      `;
    }).join('');

    return `
      <div class="stack">
        <div class="card-soft">
          <div class="stat-label">Itinerario</div>
          <div class="helper" style="margin-top: 6px;">Próximos bloques, checkpoints y fases esperadas.</div>
        </div>
        ${cardsHtml}
      </div>
    `;
  }

  function getMyDayTimelineToneClass(tone) {
    if (tone === 'play') return '#0f766e';
    if (tone === 'referee') return '#2563eb';
    if (tone === 'checkpoint') return '#7c3aed';
    return '#94a3b8';
  }

  function getMyDayPlayerRoleUi(vm) {
    const hasCurrentMatch = !!vm.currentMatch;
    const isReferee = hasCurrentMatch && !!vm.currentMatch.isReferee;
    const isPlaying = hasCurrentMatch && (!!vm.currentMatch.isPlayerA || !!vm.currentMatch.isPlayerB);

    if (isReferee || isPlaying) {
      return { show: false, label: '', className: '' };
    }

    return {
      show: true,
      label: 'Sin turno',
      className: 'status-closed',
    };
  }

  function getMyDayMatchRoleUi(vm) {
    const hasCurrentMatch = !!vm.currentMatch;
    if (!hasCurrentMatch) {
      return { show: false, label: '', className: '' };
    }

    if (vm.currentMatch.isByeAdvance) {
      return {
        show: true,
        label: 'Libre por bye',
        className: 'status-closed',
      };
    }

    const isFinished = isMyDayMatchFinished(vm.currentMatch);

    if (isFinished) {
      return {
        show: true,
        label: 'Finalizado',
        className: 'status-done',
      };
    }

    if (vm.currentMatch.isReferee) {
      return {
        show: true,
        label: 'Eres árbitro en este partido',
        className: 'status-live',
      };
    }

    if (vm.currentMatch.isPlayerA || vm.currentMatch.isPlayerB) {
      return {
        show: true,
        label: 'Juega ahora',
        className: 'status-live',
      };
    }

    return { show: false, label: '', className: '' };
  }

  function isMyDayMatchFinished(match) {
    const status = String(match.matchStatus || '').trim();
    const resultMode = String(match.resultMode || '').trim();

    return (
      status === 'result_submitted' &&
      resultMode === 'final'
    ) || status === 'auto_closed';
  }

  function buildMyDayCommitmentLabel(vm) {
    if (!vm.currentBlock) {
      return {
        title: 'Sin bloque activo',
        detail: 'No hay actividad programada en este momento.',
      };
    }

    if (vm.currentMatch && vm.currentMatch.isByeAdvance) {
      return {
        title: 'Pareja libre en este bloque',
        detail: `Avance por bye · Bloque ${vm.currentBlock.id} · ${vm.currentBlock.phaseLabel}`,
      };
    }

    if (vm.currentMatch && isMyDayMatchFinished(vm.currentMatch)) {
      return {
        title: 'Partido finalizado en este bloque',
        detail: `Bloque ${vm.currentBlock.id} · ${vm.currentBlock.phaseLabel}`,
      };
    }

    if (vm.currentMatch && vm.currentMatch.isReferee) {
      return {
        title: 'Arbitraje asignado ahora',
        detail: `Bloque ${vm.currentBlock.id} · ${vm.currentBlock.phaseLabel}`,
      };
    }

    if (vm.currentMatch && (vm.currentMatch.isPlayerA || vm.currentMatch.isPlayerB)) {
      return {
        title: 'Partido asignado ahora',
        detail: `Bloque ${vm.currentBlock.id} · ${vm.currentBlock.phaseLabel}`,
      };
    }

    return {
      title: 'Sin compromiso en este bloque',
      detail: `Bloque ${vm.currentBlock.id} · ${vm.currentBlock.phaseLabel}`,
    };
  }

  function formatTournamentStateLabel(currentBlock) {
    if (!currentBlock) return 'Sin actividad';
    const status = String(currentBlock.status || '');

    if (status === 'live') return 'En curso';
    if (status === 'scheduled') return 'Programado';
    if (status === 'closing') return 'Cierre';
    if (status === 'transition') return 'Transicion';
    if (status === 'closed') return 'Cerrado';

    return status || 'Bloque';
  }

  function captureButtonClass(isSecondary) {
    return isSecondary
      ? 'capture-action capture-action-secondary'
      : 'capture-action';
  }

  function closeMatchCapture() {
    const el = document.getElementById('capture-modal-overlay');
    if (el) el.remove();
  }

  function submitMatchCaptureFinal(setsA, setsB, triggerEl) {
    submitCapturePayload({
      mode: 'final',
      setsA: setsA,
      setsB: setsB,
    }, triggerEl);
  }

  function submitMatchCaptureClosingState(closingState, triggerEl) {
    submitCapturePayload({
      mode: 'closing_state',
      closingState: closingState,
    }, triggerEl);
  }

  function submitCapturePayload(payload, triggerEl) {
    const errorBox = document.getElementById('capture-error');
    const feedbackBox = document.getElementById('capture-feedback');
    if (errorBox) {
      errorBox.style.display = 'none';
      errorBox.textContent = '';
    }
    if (feedbackBox) {
      feedbackBox.style.display = 'none';
      feedbackBox.textContent = '';
    }

    const m = currentMyDayVm.currentMatch;
    const playerId = currentMyDayVm.player.id;
    const actorRole = resolveUiActorRole(currentMyDayVm);
    setCaptureSubmittingState(true, triggerEl, payload);

    google.script.run
      .withSuccessHandler(function () {
        closeMatchCapture();
        loadMyDayFromSelect(true);
        loadPublicScreen({ silent: true });
      })
      .withFailureHandler(function (err) {
        setCaptureSubmittingState(false);
        if (!errorBox) return;
        errorBox.style.display = 'block';
        errorBox.textContent = err.message || String(err);
      })
      .submitMatchResultFromUi({
        matchId: m.matchId,
        mode: payload.mode,
        setsA: payload.setsA,
        setsB: payload.setsB,
        closingState: payload.closingState,
        actorPlayerId: playerId,
        actorRole: actorRole
      });
  }

  function setCaptureSubmittingState(isSubmitting, triggerEl, payload) {
    const buttons = document.querySelectorAll('#capture-modal-overlay .capture-action');
    const closeButton = document.querySelector('#capture-modal-overlay .capture-close');
    const feedbackBox = document.getElementById('capture-feedback');

    buttons.forEach(function (button) {
      button.disabled = isSubmitting;
      button.classList.remove('is-pressed');
    });

    if (closeButton) {
      closeButton.disabled = isSubmitting;
    }

    if (isSubmitting && triggerEl) {
      triggerEl.classList.add('is-pressed');
    }

    if (!feedbackBox) return;

    if (!isSubmitting) {
      feedbackBox.style.display = 'none';
      feedbackBox.textContent = '';
      return;
    }

    feedbackBox.style.display = 'block';
    feedbackBox.textContent = buildCaptureSubmittingLabel(payload);
  }

  function buildCaptureSubmittingLabel(payload) {
    if (!payload) return 'Enviando resultado...';
    if (payload.mode === 'final') {
      return `Enviando resultado final ${payload.setsA}-${payload.setsB}...`;
    }
    return `Enviando estado parcial ${mapClosingStateShortLabel(payload.closingState)}...`;
  }

  function mapClosingStateShortLabel(closingState) {
    if (closingState === 'A_1_0') return 'A 1-0';
    if (closingState === 'B_1_0') return 'B 1-0';
    if (closingState === 'ONE_ONE') return '1-1';
    if (closingState === 'NOT_STARTED') return 'no iniciado';
    return 'parcial';
  }

  function resolveUiActorRole(vm) {
    if (!vm || !vm.currentMatch) return 'player';
    if (vm.currentMatch.isReferee) return 'referee';
    return 'player';
  }

  function buildMyDayCta(vm) {
    if (!vm.currentMatch) {
      return {
        label: 'Sin accion disponible en este bloque',
        disabled: true,
        helperText: 'No tienes un partido o arbitraje asignado en este bloque.',
      };
    }

    if (vm.currentMatch.isByeAdvance) {
      return {
        label: 'Libre por bye',
        disabled: true,
        helperText: 'Tu pareja no juega este bloque y avanza automaticamente a la siguiente ronda.',
      };
    }

    if (isMyDayMatchFinished(vm.currentMatch)) {
      return {
        label: 'Partido ya finalizado',
        disabled: true,
        helperText: 'La captura queda cerrada porque el partido ya fue registrado.',
      };
    }

    const actions = vm.currentMatch.allowedCaptureActions || {};

    if (vm.currentMatch.isReferee && actions.canOpen) {
      return {
        label: 'Ingresar resultado',
        disabled: false,
        helperText: 'Como arbitro puedes confirmar resultado final o resultado parcial.',
      };
    }

    if ((vm.currentMatch.isPlayerA || vm.currentMatch.isPlayerB) && actions.canOpen) {
      return {
        label: 'Ingresar resultado',
        disabled: false,
        helperText: 'Como jugador puedes ingresar resultado final o un resultado parcial.',
      };
    }

    return {
      label: 'Captura no disponible',
      disabled: true,
      helperText: 'La captura se habilita solo cuando el bloque esta en juego o en cierre.',
    };
  }

  function openMatchCapture() {
    if (!currentMyDayVm || !currentMyDayVm.currentMatch) return;
    if (isMyDayMatchFinished(currentMyDayVm.currentMatch)) return;

    const m = currentMyDayVm.currentMatch;
    const actions = m.allowedCaptureActions || {};
    const isReferee = !!m.isReferee;

    if (!actions.canOpen) return;

    const modalTitle = 'Captura de resultado';
    const actionPanelsHtml = buildRefereeCapturePanel(m, isReferee);
    const actorWarning = isReferee ? '' : 'Los resultados capturados por jugadores pueden ser reemplazados por el arbitro.';

    const html = `
      <div id="capture-modal-overlay" style="
        position: fixed;
        inset: 0;
        background: rgba(15,23,42,0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: 16px;
      ">
        <div style="
          background: white;
          border-radius: 16px;
          padding: 20px;
          position: relative;
          width: 100%;
          max-width: 480px;
          max-height: 90vh;
          overflow: auto;
        ">
          <button class="capture-close" type="button" aria-label="Cerrar captura" onclick="closeMatchCapture()">
            <span aria-hidden="true">&times;</span>
          </button>

          <div style="font-weight:bold; font-size:18px; margin-bottom: 6px; padding-right: 44px;">
            ${escapeHtml(modalTitle)}
          </div>

          <div class="helper" style="margin-bottom: 12px; padding-right: 44px;">
            Mesa ${escapeHtml(m.tableNo)} · ${escapeHtml(m.phaseLabel)}
          </div>

          ${buildCaptureSidesLegend(m)}

          <div class="helper" style="display:none;">
            Mesa ${escapeHtml(m.tableNo)} · ${escapeHtml(m.phaseLabel)}
          </div>

          ${actionPanelsHtml}

          ${actorWarning ? `<div class="helper" style="margin-top: 14px;">${escapeHtml(actorWarning)}</div>` : ''}

          <div id="capture-feedback" class="helper" style="display:none; margin-top:12px; color:#0f172a;"></div>
          <div id="capture-error" class="error" style="display:none; margin-top:12px;"></div>
        </div>
      </div>
    `;

    closeMatchCapture();
    document.body.insertAdjacentHTML('beforeend', html);
  }

  function buildCaptureSidesLegend(match) {
    return `
      <div class="capture-sides-map capture-sides-map--inline" style="margin-bottom: 14px;">
        <div class="capture-side-card">
          <span class="capture-side-badge">A</span>
          <div class="capture-side-label">${escapeHtml(match.leftLabel || '-')}</div>
        </div>
        <div class="capture-side-vs">VS</div>
        <div class="capture-side-card">
          <span class="capture-side-badge">B</span>
          <div class="capture-side-label">${escapeHtml(match.rightLabel || '-')}</div>
        </div>
      </div>
    `;
  }

  function buildRefereeCapturePanel(match, isReferee) {
    return `
      <div class="card-soft" style="margin-bottom: 14px;">
        <div class="stat-label" style="margin-bottom: 10px;">Resultado final</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <button class="${captureButtonClass()}" onclick="submitMatchCaptureFinal(2,0, this)">A gana 2-0</button>
          <button class="${captureButtonClass()}" onclick="submitMatchCaptureFinal(2,1, this)">A gana 2-1</button>
          <button class="${captureButtonClass()}" onclick="submitMatchCaptureFinal(0,2, this)">B gana 0-2</button>
          <button class="${captureButtonClass()}" onclick="submitMatchCaptureFinal(1,2, this)">B gana 1-2</button>
        </div>
      </div>

      <div class="card-soft">
        <div class="stat-label" style="margin-bottom: 10px;">Resultado parcial (OPCIONAL)</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <button class="${captureButtonClass(true)}" onclick="submitMatchCaptureClosingState('A_1_0', this)">A lidera 1-0</button>
          <button class="${captureButtonClass(true)}" onclick="submitMatchCaptureClosingState('B_1_0', this)">B lidera 0-1</button>
          <button class="${captureButtonClass(true)}" onclick="submitMatchCaptureClosingState('ONE_ONE', this)">van 1-1</button>
          <button class="${captureButtonClass(true)}" onclick="submitMatchCaptureClosingState('NOT_STARTED', this)">No iniciado</button>
        </div>
      </div>
    `;
  }

  function renderMyDayError(error) {
    document.getElementById('myday-content').innerHTML =
      '<div class="error">' + escapeHtml(error.message || String(error)) + '</div>';
  }

  function savePlayerId(playerId) {
    try {
      localStorage.setItem(LOCAL_STORAGE_PLAYER_KEY, String(playerId || ''));
    } catch (e) {
      console.warn('No se pudo guardar player_id en localStorage', e);
    }
  }

  function getSavedPlayerId() {
    try {
      return localStorage.getItem(LOCAL_STORAGE_PLAYER_KEY) || '';
    } catch (e) {
      return '';
    }
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>
